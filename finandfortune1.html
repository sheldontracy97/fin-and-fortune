<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🐟 Fin & Fortune — Fish Shop Tycoon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0e0a04;font-family:'Nunito',sans-serif;color:#2a1a0a;overflow:hidden;height:100vh;width:100vw;}
/* VISUAL UPGRADE: Topbar — richer gradient with inner highlight */
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;
  background:linear-gradient(180deg,#8a6418 0%,#6b4f0f 60%,#5a4008 100%);
  border-bottom:2px solid #a07820;
  display:flex;align-items:center;gap:6px;padding:0 12px;
  box-shadow:0 4px 18px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.12);}
.logo{font-family:'Press Start 2P',monospace;font-size:.58rem;color:#FFD700;
  text-shadow:2px 2px #000,0 0 12px rgba(255,215,0,.4);white-space:nowrap;margin-right:6px;}
/* VISUAL UPGRADE: Chips — frosted glass look */
.tb-chip{display:flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,rgba(0,0,0,.4),rgba(0,0,0,.25));
  border-radius:8px;padding:4px 10px;
  border:1px solid rgba(255,255,255,.14);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap;}
.tv{color:#FFD700;font-weight:800;}.tl{color:rgba(255,255,255,.45);font-size:.6rem;}
.sep{width:1px;height:28px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.15),transparent);margin:0 2px;}
#xp-wrap{display:flex;flex-direction:column;gap:2px;min-width:110px;}
.xp-row{display:flex;justify-content:space-between;font-size:.58rem;color:rgba(255,255,255,.55);}
.xp-bar{height:6px;background:rgba(0,0,0,.35);border-radius:3px;overflow:hidden;border:1px solid rgba(0,0,0,.3);}
#xp-fill{height:100%;background:linear-gradient(90deg,#2ec4b6,#a8e6cf);width:0%;transition:width .4s ease-out;box-shadow:0 0 6px rgba(46,196,182,.5);}
#main-layout{position:fixed;top:50px;left:0;right:0;bottom:0;display:flex;}
#game-canvas{flex:1;image-rendering:pixelated;cursor:default;min-width:0;}
/* VISUAL UPGRADE: Right panel — warmer, deeper shadow */
#right-panel{width:268px;min-width:268px;height:100%;
  background:linear-gradient(180deg,#f8eedd 0%,#f2e4c8 100%);
  border-left:2px solid #b88820;
  display:flex;flex-direction:column;
  box-shadow:-4px 0 20px rgba(0,0,0,.3);z-index:80;}
#rp-min-btn{display:none;align-items:center;justify-content:center;flex-shrink:0;
  width:24px;height:24px;margin:6px 6px 6px 0;
  border:1px solid rgba(106,74,24,.35);border-radius:7px;
  background:linear-gradient(180deg,#f3e4c1,#dfc798);color:#6a4a18;font-size:.82rem;
  font-weight:900;cursor:pointer;}
#rp-min-btn:hover{color:#1a9e92;}
/* VISUAL UPGRADE: Tabs — cleaner active state */
.rp-tabs{display:flex;background:linear-gradient(180deg,#e8d5a8,#d8c490);border-bottom:2px solid #b88820;flex-shrink:0;}
.rp-tab{flex:1;padding:8px 1px;text-align:center;font-size:.54rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:#6a4a18;transition:all .18s;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:'Nunito',sans-serif;line-height:1.4;}
.rp-tab:hover:not(.rp-tab-active){background:rgba(46,196,182,.1);color:#2ec4b6;}
.rp-tab-active{color:#1a9e92;border-bottom-color:#2ec4b6;background:linear-gradient(180deg,rgba(46,196,182,.12),transparent);}
#rp-body{flex:1;overflow-y:auto;padding:10px;}
#rp-body::-webkit-scrollbar{width:5px;}
#rp-body::-webkit-scrollbar-track{background:rgba(0,0,0,.05);}
#rp-body::-webkit-scrollbar-thumb{background:linear-gradient(#c49a3a,#a07820);border-radius:3px;}
/* VISUAL UPGRADE: Section headings */
.usec{font-size:.59rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#7a4a10;margin:12px 0 6px;display:flex;align-items:center;gap:5px;}
.usec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#b88820,transparent);}
/* VISUAL UPGRADE: Cards — softer shadow, warmer bg */
.ucard{background:linear-gradient(180deg,#fff 0%,#fdf8ee 100%);border-radius:10px;padding:10px 12px;border:1px solid #d4a840;margin-bottom:7px;transition:border-color .18s,box-shadow .18s;box-shadow:0 2px 6px rgba(0,0,0,.07);}
.ucard:hover{border-color:#2ec4b6;box-shadow:0 3px 12px rgba(46,196,182,.15);}
.utop{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.uico{font-size:1.05rem;}.unam{font-weight:700;font-size:.75rem;flex:1;}.ulvl{font-size:.58rem;color:#2ec4b6;font-weight:700;}
.udesc{font-size:.63rem;color:#6a4820;margin-bottom:6px;line-height:1.45;}
.ubuy{display:flex;align-items:center;justify-content:space-between;}
.ucost{font-size:.65rem;font-weight:700;color:#b88000;}
/* VISUAL UPGRADE: Buy button — richer gradient + glow hover */
.ubtn{padding:5px 11px;border-radius:8px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.65rem;
  background:linear-gradient(135deg,#3dd4c6,#1a9e92);color:#fff;transition:all .18s;
  box-shadow:0 2px 6px rgba(26,158,146,.3);}
.ubtn:hover:not(:disabled){transform:translateY(-1px) scale(1.04);box-shadow:0 4px 12px rgba(26,158,146,.5);}
.ubtn:active:not(:disabled){transform:scale(.97);}
.ubtn:disabled{background:linear-gradient(135deg,#ccc,#bbb);cursor:not-allowed;transform:none;box-shadow:none;}
.scard{background:linear-gradient(180deg,#fff,#fdf8ee);border-radius:10px;padding:10px 12px;border:1px solid #d4a840;margin-bottom:7px;box-shadow:0 2px 5px rgba(0,0,0,.06);}
.sl{font-size:.6rem;color:#6a4820;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.sv{font-family:'Press Start 2P',monospace;font-size:.72rem;color:#1a9e92;margin-top:4px;}
/* VISUAL UPGRADE: Action buttons — deeper shadows, tighter font */
#bottom-btns{position:fixed;bottom:16px;left:16px;z-index:95;display:flex;flex-direction:column;gap:8px;}
.bb{padding:9px 15px;border-radius:12px;border:none;cursor:pointer;font-family:'Press Start 2P',monospace;font-size:.48rem;
  box-shadow:0 5px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;}
.bb:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.45);}
.bb:active{transform:scale(.96);}
.bb-sort{background:linear-gradient(135deg,#3dd4c6,#1a9e92);color:#fff;}
.bb-fish{background:linear-gradient(135deg,#5aa0e8,#2a6aac);color:#fff;}
.bb-shop{background:linear-gradient(135deg,#f8b848,#d4841a);color:#fff;}
.bb-menu{background:linear-gradient(135deg,#9b6fd4,#6a3fa8);color:#fff;display:none;}
@media(max-width:768px){.bb-menu{display:flex;}}
/* VISUAL UPGRADE: Notification — warmer, softer glow */
#notif{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:400;
  background:linear-gradient(135deg,rgba(25,15,5,.96),rgba(40,25,8,.96));
  color:#fff;border-radius:12px;padding:10px 20px;font-weight:700;font-size:.78rem;
  box-shadow:0 6px 28px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08);
  opacity:0;transition:opacity .3s;pointer-events:none;max-width:420px;text-align:center;
  border:1px solid rgba(200,160,60,.3);}
/* VISUAL UPGRADE: Banner — richer shimmer */
#mbanner{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-90px);z-index:300;
  transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  background:linear-gradient(135deg,#FFD700,#f4a931,#FFD700);background-size:200% 100%;
  border-radius:13px;padding:11px 24px;font-weight:800;font-size:.82rem;color:#2a1a0a;
  box-shadow:0 8px 30px rgba(244,169,49,.6),inset 0 1px 0 rgba(255,255,255,.35);
  text-align:center;max-width:440px;border:2px solid rgba(255,255,255,.3);}
/* VISUAL UPGRADE: Overlays — deeper, warmer */
.ovbg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;}
.ovpanel{background:linear-gradient(180deg,#f8eedd,#f0e0c0);border-radius:18px;border:3px solid #9a7418;box-shadow:0 24px 70px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.2);display:flex;flex-direction:column;overflow:hidden;max-height:92vh;}
.ovhdr{background:linear-gradient(135deg,#7a5a10,#6b4f0f);padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #9a7418;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.ovtitle{font-weight:800;font-size:1rem;color:#FFD700;text-shadow:1px 1px 4px rgba(0,0,0,.5);}
.ovcls{margin-left:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.76rem;transition:all .15s;}
.ovcls:hover{background:rgba(255,255,255,.22);color:#fff;}
.fcbtn{border:none;border-radius:9px;color:#fff;padding:7px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.74rem;transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.fcbtn:hover{filter:brightness(1.12);transform:translateY(-1px);}
.fcard{background:linear-gradient(180deg,#fff,#fdf8ee);border-radius:11px;padding:10px 13px;border:2px solid #e0d0b0;margin-bottom:9px;box-shadow:0 2px 6px rgba(0,0,0,.07);}
.fcard.sick{border-color:#ff8888;background:linear-gradient(180deg,#fff5f5,#ffeee8);}

/* Shipment shelf-stocking minigame */
.ps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.ps-shelf{border:2px solid #b58a3a;border-radius:12px;background:linear-gradient(180deg,#fff7e8,#f2dfba);padding:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);} 
.ps-shelf h4{font-size:.66rem;color:#5c3d08;margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;}
.ps-row{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.ps-row:last-child{margin-bottom:0;}
.ps-rowlbl{font-size:.52rem;font-weight:800;color:#6d4d15;min-width:38px;text-transform:uppercase;}
.ps-slot{flex:1;border:2px dashed rgba(0,0,0,.22);border-radius:8px;min-height:34px;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .14s;background:rgba(255,255,255,.5);} 
.ps-slot.hot{border-style:solid;transform:scale(1.03);} 
.ps-slot.filled{border-style:solid;border-color:rgba(0,0,0,.2);background:rgba(255,255,255,.85);} 
.ps-item{display:flex;align-items:center;gap:7px;border-radius:9px;padding:6px 8px;cursor:grab;border:2px solid rgba(0,0,0,.14);box-shadow:0 2px 7px rgba(0,0,0,.12);} 
.ps-item b{font-size:.64rem;display:block;line-height:1.1;color:#2a1a0a;}
.ps-item small{font-size:.54rem;color:rgba(0,0,0,.62);}

#fish-tip{
  position:fixed;
  z-index:9999;
  pointer-events:auto;
  display:none;
  min-width:240px;
  max-width:330px;
  background:rgba(255,255,255,0.96);
  border:1px solid rgba(0,0,0,0.2);
  border-radius:12px;
  box-shadow:0 10px 28px rgba(0,0,0,0.22);
  padding:10px 12px;
  color:#2a1a0a;
}
#fish-tip .ft-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
#fish-tip .ft-h .em{font-size:1.4rem;}
#fish-tip .ft-h .nm{font-weight:800;font-size:.85rem;}
#fish-tip .ft-sub{font-size:.63rem;color:#666;margin-top:1px;}
#fish-tip .ft-row{display:flex;align-items:center;justify-content:space-between;font-size:.7rem;margin:4px 0;}
#fish-tip .ft-bar{height:7px;background:rgba(0,0,0,0.08);border-radius:5px;overflow:hidden;flex:1;margin-left:8px;}
#fish-tip .ft-fill{height:100%;}
#fish-tip .ft-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
#fish-tip .ft-btn{
  border:none;border-radius:8px;padding:6px 9px;cursor:pointer;
  font-weight:800;font-size:.68rem;font-family:Nunito,sans-serif;
  color:#fff;
}
#fish-tip .ft-btn:disabled{opacity:.45;cursor:not-allowed;}

.hbw{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.hbl{font-size:.6rem;color:#888;width:40px;flex-shrink:0;}
.hb{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden;border:1px solid rgba(0,0,0,.06);}
.hbf{height:100%;border-radius:3px;transition:width .4s ease-out;}
@keyframes popIn{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes fadeFlash{from{opacity:1}to{opacity:0}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:linear-gradient(#c49a3a,#a07820);border-radius:3px;}
/* ── MOBILE RESPONSIVE ───────────────────────────────── */
@media(max-width:768px){
  /* Topbar — compact, hide secondary labels */
  #topbar{height:44px;gap:3px;padding:0 7px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .logo{font-size:.46rem;margin-right:1px;}
  .tb-chip{font-size:.6rem;padding:3px 7px;}
  .tl{display:none;}
  #xp-wrap{min-width:72px;}
  .xp-row{font-size:.48rem;}
  .sep{display:none;}
  /* Main layout — leave room for bottom action bar */
  #main-layout{top:44px;bottom:60px;}
  /* Right panel — bottom sheet */
  #right-panel{
    position:fixed;bottom:60px;left:0;right:0;
    width:100%;min-width:unset;height:60vh;
    border-left:none;border-top:2px solid #b88820;
    border-radius:16px 16px 0 0;
    transform:translateY(110%);
    transition:transform .35s cubic-bezier(.34,1.2,.64,1);
    z-index:91;
  }
  #right-panel.rp-open{transform:translateY(0);}
  #right-panel.rp-minimized-mobile{transform:translateY(calc(100% - 44px));}
  #right-panel.rp-minimized-mobile .rp-tab,#right-panel.rp-minimized-mobile #rp-body{display:none;}
  #rp-handle{display:flex;}
  #rp-min-btn{display:flex;}
  #rp-backdrop{display:block;}
  /* Tabs — bigger touch targets */
  .rp-tab{padding:11px 1px;font-size:.57rem;}
  /* Bottom action bar */
  #bottom-btns{
    position:fixed;bottom:0;left:0;right:0;
    flex-direction:row;align-items:center;justify-content:stretch;
    gap:5px;padding:6px 6px 8px;
    background:linear-gradient(180deg,#5a4008,#3a2804);
    border-top:2px solid #a07820;
    box-shadow:0 -4px 16px rgba(0,0,0,.4);
    height:60px;box-sizing:border-box;
  }
  .bb{
    flex:1;padding:7px 3px;font-size:.36rem;border-radius:9px;
    justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  /* Overlays */
  .ovpanel{width:96vw;max-width:96vw;}
#fish-tip{max-width:88vw;}
  /* Startup */
  #startup-ui{padding:24px 26px;min-width:unset;width:88vw;}
  .su-logo{font-size:1rem;}
}
/* Panel drag handle (desktop: hidden) */
#rp-handle{
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;padding:8px 0 4px;
  cursor:pointer;background:linear-gradient(180deg,#e8d5a8,#d8c490);flex-shrink:0;
}
#rp-handle-bar{width:38px;height:4px;background:rgba(0,0,0,.18);border-radius:2px;}
#rp-handle-lbl{font-size:.5rem;color:rgba(80,50,10,.5);font-weight:700;letter-spacing:.5px;}
/* Backdrop (desktop: hidden) */
#rp-backdrop{
  display:none;position:fixed;inset:0;z-index:90;
  background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .3s;
}
#rp-backdrop.rp-open{opacity:1;pointer-events:all;}
@media (min-width:769px){
  #right-panel{position:relative;transition:width .24s ease,min-width .24s ease;}
  #rp-min-btn{display:flex;}
  #right-panel.rp-minimized{width:44px;min-width:44px;}
  #right-panel.rp-minimized .rp-tab,
  #right-panel.rp-minimized #rp-body,
  #right-panel.rp-minimized #rp-handle{display:none;}
  #right-panel.rp-minimized .rp-tabs{
    justify-content:center;padding-left:0;border-bottom:none;
    background:transparent;
  }
}
/* ── STARTUP SCREEN ─────────────────────────────────── */
#startup-screen{position:fixed;inset:0;z-index:9999;background:#060e1e;display:flex;align-items:center;justify-content:center;}
#startup-canvas{position:absolute;inset:0;width:100%;height:100%;}
#startup-ui{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:14px;
  background:linear-gradient(180deg,rgba(8,16,34,.88),rgba(4,8,18,.93));
  border:2px solid rgba(46,196,182,.45);border-radius:20px;padding:34px 44px;
  box-shadow:0 0 60px rgba(46,196,182,.18),0 20px 60px rgba(0,0,0,.7);
  backdrop-filter:blur(10px);text-align:center;min-width:320px;}
.su-logo{font-family:'Press Start 2P',monospace;font-size:1.3rem;color:#FFD700;
  text-shadow:2px 2px #000,0 0 24px rgba(255,215,0,.55);line-height:1.5;}
.su-sub{font-family:'Press Start 2P',monospace;font-size:.46rem;color:rgba(255,255,255,.4);
  letter-spacing:2.5px;margin-top:-6px;}
#su-save{background:rgba(255,255,255,.06);border:1px solid rgba(46,196,182,.25);border-radius:12px;
  padding:13px 18px;width:100%;min-height:56px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;}
.su-save-lbl{font-size:.55rem;color:rgba(255,255,255,.38);letter-spacing:1px;text-transform:uppercase;}
.su-save-row{display:flex;gap:16px;justify-content:center;}
.su-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.su-stat-val{font-family:'Press Start 2P',monospace;font-size:.65rem;color:#2ec4b6;}
.su-stat-lbl{font-size:.52rem;color:rgba(255,255,255,.4);}
#su-btns{display:flex;flex-direction:column;gap:9px;width:100%;}
#su-play{padding:13px 0;width:100%;border-radius:12px;border:none;cursor:pointer;
  font-family:'Press Start 2P',monospace;font-size:.68rem;
  background:linear-gradient(135deg,#3dd4c6,#1a9e92);color:#fff;
  box-shadow:0 4px 20px rgba(26,158,146,.55);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
#su-play:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(26,158,146,.65);}
#su-play:active{transform:scale(.97);}
#su-reset{padding:9px 0;width:100%;border-radius:10px;border:1px solid rgba(255,100,100,.35);
  cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.74rem;
  background:rgba(255,80,80,.08);color:rgba(255,160,160,.85);transition:all .18s;}
#su-reset:hover{background:rgba(255,80,80,.18);color:#ffaaaa;}
#su-confirm{background:rgba(255,50,50,.1);border:1px solid rgba(255,100,100,.35);
  border-radius:10px;padding:12px 14px;width:100%;text-align:center;}
#su-confirm p{font-size:.68rem;color:#ffaaaa;margin-bottom:9px;line-height:1.5;}
#su-confirm button{padding:6px 13px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.68rem;margin:0 3px;transition:all .15s;}
.su-cfm-yes{background:#c0392b;color:#fff;}.su-cfm-yes:hover{background:#e74c3c;}
.su-cfm-no{background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);}.su-cfm-no:hover{background:rgba(255,255,255,.18);}
</style>
</head>
<body>
<div id="startup-screen">
  <canvas id="startup-canvas"></canvas>
  <div id="startup-ui">
    <div class="su-logo">🐟 Fin &amp; Fortune</div>
    <div class="su-sub">Fish Shop Tycoon</div>
    <div id="su-save"></div>
    <div id="su-btns">
      <button id="su-play" onclick="startupPlay()">▶ Play</button>
      <button id="su-reset" onclick="startupReset()">🗑 New Game</button>
    </div>
    <div id="su-confirm" style="display:none">
      <p>Reset all progress?<br>This cannot be undone!</p>
      <button class="su-cfm-yes" onclick="confirmReset()">✅ Yes, Reset</button>
      <button class="su-cfm-no" onclick="document.getElementById('su-confirm').style.display='none'">❌ Cancel</button>
    </div>
  </div>
</div>
<div id="topbar">
  <span class="logo">🐟 Fin &amp; Fortune</span>
  <div class="sep"></div>

const AUDIO={ctx:null,master:null,music:null,started:false,musicTimer:null,lastClickSfx:0,unlockBound:false};

function audCtx(){
  if(AUDIO.ctx)return AUDIO.ctx;
  const Ctx=window.AudioContext||window.webkitAudioContext;
  if(!Ctx)return null;
  AUDIO.ctx=new Ctx();
  AUDIO.master=AUDIO.ctx.createGain();
  AUDIO.master.gain.value=.32;
  AUDIO.master.connect(AUDIO.ctx.destination);
  AUDIO.music=AUDIO.ctx.createGain();
  AUDIO.music.gain.value=.22;
  AUDIO.music.connect(AUDIO.master);
  return AUDIO.ctx;
}
function audTone(freq=440,dur=.08,type='sine',vol=.03,when=0){
  const ctx=audCtx();if(!ctx)return;
  const t=ctx.currentTime+when;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(AUDIO.master);
  o.start(t);o.stop(t+dur+.02);
}
function playClickSfx(){
  const ctx=audCtx();if(!ctx)return;
  const now=performance.now();
  if(now-AUDIO.lastClickSfx<40)return; // keep rapid taps subtle
  AUDIO.lastClickSfx=now;
  const base=window.innerWidth<=768?600:680;
  audTone(base,.05,'triangle',.045,0);
  audTone(base*1.4,.04,'sine',.024,.02);
}
function bgmStep(){
  const ctx=audCtx();if(!ctx||!AUDIO.started)return;
  const prog=[220,247,262,247,220,196,185,196];
  const bass=[110,123,131,123];
  const beat=.62;
  const i=((Date.now()/620)|0)%prog.length;
  const j=((Date.now()/1240)|0)%bass.length;
  const t0=ctx.currentTime+.02;

  // soft pad-like lead
  const o1=ctx.createOscillator(),g1=ctx.createGain(),f1=ctx.createBiquadFilter();
  o1.type='triangle';o1.frequency.setValueAtTime(prog[i],t0);
  f1.type='lowpass';f1.frequency.setValueAtTime(1100,t0);
  g1.gain.setValueAtTime(0.0001,t0);
  g1.gain.exponentialRampToValueAtTime(.055,t0+.12);
  g1.gain.exponentialRampToValueAtTime(0.0001,t0+beat*.95);
  o1.connect(f1);f1.connect(g1);g1.connect(AUDIO.music);
  o1.start(t0);o1.stop(t0+beat);

  // warm bass layer
  const o2=ctx.createOscillator(),g2=ctx.createGain();
  o2.type='sine';o2.frequency.setValueAtTime(bass[j],t0);
  g2.gain.setValueAtTime(0.0001,t0);
  g2.gain.exponentialRampToValueAtTime(.038,t0+.08);
  g2.gain.exponentialRampToValueAtTime(0.0001,t0+beat*.9);
  o2.connect(g2);g2.connect(AUDIO.music);
  o2.start(t0);o2.stop(t0+beat);
}
function startAudio(){
  const ctx=audCtx();if(!ctx||AUDIO.started)return;
  const begin=()=>{
    if(AUDIO.started)return;
    AUDIO.started=true;
    bgmStep();
    AUDIO.musicTimer=setInterval(bgmStep,620);
  };
  if(ctx.state==='suspended'){
    ctx.resume().then(begin).catch(()=>{});
  }else begin();
}

}

// SHELF CAPACITY SYSTEM (per category)
// ═══════════════════════════════════════════════════
const CATS=['food','medicine','equipment','decor','misc'];
const SHELF_BASE={food:10, medicine:8, equipment:8, decor:8, misc:6};

// Fast lookup: product id -> product meta (for category capacity checks)
const PROD_BY_ID={};
PRODUCTS.forEach(p=>PROD_BY_ID[p.id]=p);

function catInv(cat){
  let t=0;
  for(const [pid,q] of Object.entries(G.inv)){
    const p=PROD_BY_ID[pid];
    if(p && p.cat===cat) t+=q;
  }
  return t;
}
function shelfCap(cat){
  const base=SHELF_BASE[cat]||8;
  // Level bonus: every 2 levels adds +1 capacity to each category (gentle, long-term growth)
  const lvBonus=Math.floor(Math.max(0,G.lv-1)/2);
  // Upgrade bonus: keep old upgrade id 'shelf_cap' but make it expand ALL categories.
  // Each level adds +4 per category = +20 total per level (matches prior +20 inv cap per level).
  const upAll=(ul('shelf_cap')||0)*4;
  return base + lvBonus + upAll;
}
function totalShelfCap(){
  return CATS.reduce((s,c)=>s+shelfCap(c),0);
}
function shelvesFull(){
  return totalInv()>=totalShelfCap();
}

const FISH_META={
  guppy:{size:1,aggr:1,group:'community'},
  neon:{size:1,aggr:1,group:'community'},
  cory:{size:1,aggr:1,group:'community'},
  discus:{size:2,aggr:1,group:'community'},
  goldie:{size:2,aggr:2,group:'semi'},
  clown:{size:2,aggr:2,group:'semi'},
  betta:{size:2,aggr:3,group:'semi'},
  arowana:{size:4,aggr:5,group:'aggressive'},
};
function metaOf(sp){ return FISH_META[sp]||{size:2,aggr:2,group:'community'}; }
function tankHasIncompat(tank){
  const fs=tank.fish;
  for(let i=0;i<fs.length;i++){
    const mi=metaOf(fs[i].sp);
    for(let j=i+1;j<fs.length;j++){
      const mj=metaOf(fs[j].sp);
      if(isIncompatible(mi,mj)) return true;
    }
  }
  return false;
}
function isIncompatible(a,b){
  if(a.group==='aggressive' && b.group!=='aggressive') return true;
  if(b.group==='aggressive' && a.group!=='aggressive') return true;
  // Betta-like semi-aggressive: risky with community when size advantage
  if(a.group==='semi' && b.group==='community' && a.size>=b.size+1) return true;
  if(b.group==='semi' && a.group==='community' && b.size>=a.size+1) return true;
  return false;
}
function resolvePredation(tank){
  if(tank.fish.length<2) return;
  // pick the "top" predator and "lowest" prey among an incompatible pair
  let predator=null, prey=null, best=-1;
  const fs=tank.fish;
  for(let i=0;i<fs.length;i++){
    const fi=fs[i], mi=metaOf(fi.sp);
    const si=mi.size + mi.aggr*0.6;
    for(let j=i+1;j<fs.length;j++){
      const fj=fs[j], mj=metaOf(fj.sp);
      if(!isIncompatible(mi,mj)) continue;
      const sj=mj.size + mj.aggr*0.6;
      const p = si>=sj ? fi : fj;
      const q = si>=sj ? fj : fi;
      const mp = si>=sj ? mi : mj;
      const mq = si>=sj ? mj : mi;
      const ps = (mp.size + mp.aggr*0.6);
      const qs = (mq.size + mq.aggr*0.6);
      const gap = ps-qs;
      if(gap>best){ best=gap; predator=p; prey=q; }
    }
  }
  if(!predator || !prey) return;

  const mp=metaOf(predator.sp), mq=metaOf(prey.sp);
  // chance scales with aggression & size gap
  let chance = 0.0;
  if(mp.group==='aggressive') chance = 0.35 + Math.min(0.35, best*0.12);
  else if(mp.group==='semi') chance = 0.12 + Math.min(0.25, best*0.10);
  // hungry predators more likely
  chance *= (1 + Math.max(0, (65 - (predator.hunger||65))/120));
  if(Math.random() > chance) return;

  const preyName = (FISH.find(s=>s.id===prey.sp)?.name) || 'Fish';
  const predName = (FISH.find(s=>s.id===predator.sp)?.name) || 'Fish';
  // remove prey
  const idx = tank.fish.findIndex(f=>f.id===prey.id);
  if(idx>=0) tank.fish.splice(idx,1);
  predator.hunger = Math.min(100, (predator.hunger||0) + 45);
  notify('😳 '+predName+' ate a '+preyName+' in Tank '+(tank.slot+1)+'!');
  spawnFloat('CHOMP!', W/2, H/2, '#ff6666', 1.25);
  spawnPfx(W/2, H/2, '#ff6666', 14);
  // customer satisfaction penalty
  G.sat = Math.max(30, G.sat - 6);
}

  G.xp+=n;
  const need=XP_TABLE[Math.min(G.lv,XP_TABLE.length-1)];
  if(G.xp>=need&&G.lv<10){G.xp-=need;G.lv++;return true;}return false;
}
function totalInv(){return Object.values(G.inv).reduce((a,b)=>a+b,0);}
function addInv(id,q=1){
  if(!G.inv[id])G.inv[id]=0;
  const p=PROD_BY_ID[id];
  const cat=p?p.cat:'misc';
  const capCat=shelfCap(cat);
  const spaceCat=capCat - catInv(cat);
  const spaceTotal=totalShelfCap() - totalInv();
  const space=Math.max(0,Math.min(spaceCat,spaceTotal));
  const a=Math.min(q,space);
  if(a<=0) return 0;
  G.inv[id]+=a;
  // keep legacy invMax in sync for UI / saves
  G.invMax=totalShelfCap();
  return a;
}
function useInv(id,q=1){
  const h=G.inv[id]||0;if(!h)return 0;
  const t=Math.min(h,q);G.inv[id]-=t;return t;
}
function spawnFloat(txt,x,y,col='#FFD700',sz=1){

}
function spawnPfx(x,y,col='#FFD700',n=8){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.5;
    G.particles.push({x,y,vx:Math.cos(a)*(1+Math.random()*2),vy:Math.sin(a)*(1+Math.random()*2),col,sz:3+Math.random()*3,life:1});
  }
}

// Dynamic time multiplier.
// Base time is REAL_TO_GAME (1 real sec = 5 in-game minutes).
// Incentive: when the shop is CLOSED during 10:00PM–6:00AM, time runs 5× faster.
function gameTimeMult(){
  // When the shop is closed, time speeds up so nights pass quickly.
  if(!G.open) return 5;
  return 1;
}
// TIME SYSTEM
// ═══════════════════════════════════════════════════
function hr(){return~~(G.gmin/60);}
function mn(){return~~(G.gmin%60);}
function timeStr(){const h=hr(),m=mn(),ap=h>=12?'PM':'AM',h12=h%12||12;return h12+':'+(m<10?'0':'')+m+' '+ap;}
function inFeed(id){const w=FEED_WINDOWS.find(f=>f.id===id);return w&&G.gmin>=w.s&&G.gmin<=w.e;}
function timeTick(dtMs){
  G.gmin+=(dtMs/1000)*REAL_TO_GAME*gameTimeMult();
  if(G.gmin>=DAY_MINS){
    G.gmin-=DAY_MINS;G.day++;
    G.tanks.forEach(t=>{if(t.unlocked){t.fedAM=false;t.fedPM=false;}});
    G.shopStats.openedToday=false;
    G.shopStats.dailyRevenue=0;
    staffTick(); // wages + auto-tasks
    notify('☀️ Day '+G.day+' begins!');
  }
}

function save(){

  const a=document.createElement('a');
  a.href=url;a.download='fin-and-fortune-save.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);

function importSave(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        applySaveData(d);
        save();
        notify('✅ Save imported successfully!');
        updateAll();
      }catch(ex){notify('❌ Invalid save file!');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════════════
// FISH CARE SYSTEM
// ═══════════════════════════════════════════════════
const H_DROP=100/(DAY_MINS/2);  // hunger drop rate per game-min
const C_DROP=100/DAY_MINS;      // cleanliness drop rate per game-min

function fishTick(dtMs){
  const gm=(dtMs/1000)*REAL_TO_GAME;
  // Vet staff cooldown uses in-game minutes
  if(_vetTick>0)_vetTick=Math.max(0,_vetTick-gm);
  G.tanks.forEach(tank=>{
    if(!tank.unlocked)return;
    const fm=[1,.5,.33,.2][Math.min(ul('filtration'),3)];
    tank.clean=Math.max(0,tank.clean-C_DROP*gm*fm);
    if(ul('clean_crew')>0)tank.clean=Math.min(100,tank.clean+.008*gm);
    // Auto feeder
    if(ul('autofeeder')>0&&!tank.fedAM&&inFeed('morning'))feedTank(tank.slot,'AM',true);
    // Fish updates
    tank.fish.forEach(f=>{
      f.hunger=Math.max(0,f.hunger-H_DROP*gm);
      let hd=0;
      if(f.hunger<30)hd+=.25;
      if(tank.clean<30)hd+=.3;
      if(f.sickness)hd+=.15; // sickness accelerates health loss
      f.health=Math.max(0,f.health-hd*gm);
      // Warning at 20%
      if(!f._warned && f.health<=20 && f.health>0){
        f._warned=true;
        const sp=FISH.find(s=>s.id===f.sp)||{name:'Fish'};
        notify('⚠️ '+sp.name+' in Tank '+(tank.slot+1)+' is critical! Feed & clean NOW!');
      }
      if(f.health>20)f._warned=false;
      if(!f.sickness)tryInfect(f,tank,gm);
      else if(f.healTimer>0){
        f.healTimer-=gm;
        if(f.healTimer<=0){f.sickness=null;f.health=Math.min(100,f.health+30);notify('💊 Fish healed!');}
      }
      // Aquatic Vet staff: auto-treats sick fish (uses correct medicine) even if fish care menu is closed
      if(f.sickness && f.healTimer<=0 && _vetTick<=0 && G.staff.some(s=>s.id==='vet')){
        const d=DISEASES[f.sickness];
        if(d && (G.inv[d.med]||0)>0){
          useInv(d.med,1);
          f.healTimer=d.heal;
          _vetTick=120; // 2 in-game hours
          spawnFloat('🩺 Vet treated!', W/2, H/2, '#87CEEB', 1.05);
        }
      }
      if(f.breedCD>0)f.breedCD-=gm;
    });
    // Fish death check
    tank.fish=tank.fish.filter(f=>{
      if(f.health<=0){
        const sp=FISH.find(s=>s.id===f.sp)||{name:'Fish'};
        notify('💀 '+sp.name+' in Tank '+(tank.slot+1)+' has died...');
        spawnFloat('💀',W/2,H/2,'#ff4444',1.5);
        G.sat=Math.max(30,G.sat-8);
        return false;
      }
      return true;
    });
    // Eggs hatch
    tank.eggs=tank.eggs.filter(e=>{
      e.t-=gm;if(e.t<=0){hatchEgg(e,tank);return false;}return true;
    });
    
    // Compatibility / predation (checked roughly once per in-game hour)
    tank.predT = (tank.predT||0) + gm;
    if(tank.predT >= 60){
      tank.predT -= 60;
      if(tankHasIncompat(tank)) resolvePredation(tank);
    }

    // Breeding countdown
    if(tank.breeding&&tank.breedTimer>0){
      tank.breedTimer-=gm;
      if(tank.breedTimer<=0)doBreed(tank);
    }
  });
  enforceQuarantinePlacement();

}

function tryInfect(f,tank,gm){
  const tb=[0,.2,.4][Math.min(ul('test_kit'),2)];
  let rm=1;
  if(f.hunger<20)rm+=2.5;else if(f.hunger<50)rm+=.8;
  if(tank.clean<20)rm+=2.5;else if(tank.clean<50)rm+=.8;
  if(tank.fish.length>4)rm+=1;
  if(Math.random()<.00025*gm*(1-tb)*rm){
    const pool=[];
    if(tank.clean<50)pool.push('ich','finrot');
    if(f.hunger<40)pool.push('fungal','swimblad');
    if(tank.fish.length>4)pool.push('stress');
    pool.push('ich');
    infectFish(f,pool[~~(Math.random()*pool.length)]);
  }
}

function infectFish(f,did){
  f.sickness=did;f.healTimer=0;
  if(!G.tutSeen[did]){
    G.tutSeen[did]=true;
    G.tutQ.push(did);
    processTutQ();
  }
}

function feedTank(slot,win,auto=false){
  const tank=G.tanks[slot];
  if(!tank||!tank.unlocked||!tank.fish.length)return false;
  const food=['flakes','pellets','bloodworm'].find(id=>(G.inv[id]||0)>0);
  if(!food&&!auto){notify('❌ No fish food! Sort a shipment first.');return false;}
  if(food)useInv(food,1);
  tank.fish.forEach(f=>f.hunger=Math.min(100,f.hunger+60));
  if(win==='AM')tank.fedAM=true;
  if(win==='PM')tank.fedPM=true;
  spawnFloat('🍽️ Fed!',W/2,H/2,'#90EE90');
  refreshFC();
  return true;
}

function cleanTank(slot){
  const tank=G.tanks[slot];if(!tank||!tank.unlocked)return;
  if((G.inv['cleanpad']||0)>0)useInv('cleanpad',1);
  tank.clean=100;tank.cleanDay=G.day;
  spawnFloat('✨ Clean!',W/2,H*.4,'#87CEEB');
  spawnPfx(W/2,H/2,'#87CEEB',10);
  refreshFC();
}

function treatFish(fishId,tankSlot,medId){
  const tank=G.tanks[tankSlot];
  const f=tank&&tank.fish.find(x=>x.id===fishId);
  if(!f||!f.sickness){notify('This fish is not sick!');return;}
  const d=DISEASES[f.sickness];
  if(!useInv(medId,1)){notify('❌ No '+PRODUCTS.find(p=>p.id===medId)?.name+' in stock!');return;}
  if(d.med===medId){
    f.healTimer=d.heal;
    notify('💊 Treating! Recovery in ~'+Math.round(d.heal/60)+'h game time');
    spawnPfx(W/2,H/2,'#00FF88',12);
  }else{
    // re-add used medicine (no penalty, just no effect)
    G.inv[medId]=(G.inv[medId]||0)+1;
    notify('⚠️ Wrong medicine! Need '+d.medName+' for '+d.name);
  }
  refreshFC();
}

function doBreed(tank){
  const ok=tank.fish.filter(f=>!f.sickness&&f.health>70&&f.breedCD<=0);
  if(ok.length<2){tank.breedTimer=60*6;return;}
  const [a,b]=ok;
  a.breedCD=60*24*2;b.breedCD=60*24*2;
  tank.eggs.push({t:60*12,n:3,nx:0.18+Math.random()*0.64,ny:0.22+Math.random()*0.55,pA:{sp:a.sp,cg:a.cg,pg:a.pg},pB:{sp:b.sp,cg:b.cg,pg:b.pg}});
  notify('🥚 Eggs laid! Hatch in ~12 game hours');
  tank.breedTimer=60*24*3;
  refreshFC();
}

function hatchEgg(egg,tank){
  const sp=egg.pA.sp;
  const cols=[egg.pA.cg,egg.pB.cg];
  const pats=['solid','spotted','striped'];
  let cg=cols[~~(Math.random()*2)],pg=egg.pA.pg;
  const mut=Math.random()<.15;
  if(mut){const s=FISH.find(x=>x.id===sp);if(s)cg=s.genes[~~(Math.random()*s.genes.length)];pg=pats[~~(Math.random()*pats.length)];}
  let rarity='common';
  if(mut)rarity='uncommon';

function genWishList(n){
  const pool = PRODUCTS.filter(p=>p.unlocked);
  if(!pool.length) return [];
  const list=[];
  for(let i=0;i<n;i++){
    // Weighted toward cheaper/common items early, but still allow variety
    const pick = pool[~~(Math.random()*pool.length)];
    list.push(pick.id);
  }
  return list;
}
function listToSummary(list){
  const counts={};
  list.forEach(id=>counts[id]=(counts[id]||0)+1);
  return Object.entries(counts).map(([id,q])=>{
    const p=PRODUCTS.find(x=>x.id===id);
    return (p?p.emoji+' '+p.name:'Item')+' ×'+q;
  }).join(', ');
}

function customerWantsFish(){

  return Math.random() < (base + qualityBoost);
}
function getSaleFishCandidate(){
  // Choose a fish that is "for sale" from any unlocked tank.
  // Weighted toward healthier fish, but allow occasional bad-condition purchases.
  const candidates=[];
  for(let ti=0; ti<G.tanks.length; ti++){
    const t=G.tanks[ti]; if(!t.unlocked) continue;
    if(t.quarantine) continue; // quarantined fish are not for sale
    for(let fi=0; fi<t.fish.length; fi++){
      const f=t.fish[fi];
      const cond = ((f.health||0)*0.6 + (f.hunger||0)*0.4)/100; // 0..1
      const w = 0.15 + cond*0.85;
      candidates.push({ti,fi,cond,w});
    }
  }
  if(!candidates.length) return null;
  let sum=0; candidates.forEach(c=>sum+=c.w);
  let r=Math.random()*sum;
  for(const c of candidates){ r-=c.w; if(r<=0) return c; }
  return candidates[candidates.length-1];
}

function pick(arr){return arr[~~(Math.random()*arr.length)];}
function custTypeRoll(){
  // Weighted by reputation and satisfaction: happier/bigger store attracts enthusiasts & high rollers
  const rep=Math.min(12,G.lv||1);
  const sat=(G.sat||70)/100;
  const wBudget=Math.max(0.18,0.45 - rep*0.02 - (sat-0.7)*0.25);
  const wRegular=0.38;
  const wEnth=Math.min(0.28,0.16 + rep*0.015 + (sat-0.7)*0.15);
  const wHigh=Math.min(0.22,0.06 + rep*0.012 + Math.max(0,(sat-0.75))*0.18);
  const sum=wBudget+wRegular+wEnth+wHigh;
  let r=Math.random()*sum;
  if((r-=wBudget)<=0) return 'Budget';
  if((r-=wRegular)<=0) return 'Regular';
  if((r-=wEnth)<=0) return 'Enthusiast';
  return 'High Roller';

function estListValue(list){
  const counts={}; list.forEach(id=>counts[id]=(counts[id]||0)+1);
  let v=0;
  for(const [id,q] of Object.entries(counts)){
    const p=PRODUCTS.find(x=>x.id===id); if(p) v += p.price*q;
  }
  return v;
}
function listCounts(list){
  const counts={}; list.forEach(id=>counts[id]=(counts[id]||0)+1); return counts;
}
function listAvailability(list){
  // Returns {have,total,missing,haveMap} based on current inventory counts (no consumption).
  const counts=listCounts(list);
  let have=0,total=0,missing=0;
  const haveMap={};
  for(const [id,q] of Object.entries(counts)){
    const inv=(G.inv&&G.inv[id])||0;
    const got=Math.min(inv,q);
    have+=got; total+=q; missing += Math.max(0,q-got);
    haveMap[id]=got;
  }
  return {have,total,missing,haveMap,counts};
}
function fishInterestLabel(c){

  const base = (c.type==='High Roller')?0.9:(c.type==='Enthusiast')?0.78:(c.type==='Regular')?0.55:0.4;
  const score = Math.max(0, Math.min(1, base*0.55 + fq*0.45 ));
  return score>0.75?'High':score>0.55?'Medium':'Low';
}
function complaintRiskLabel(){
  // Based on current display quality and presence of low-condition fish
  const fq=fishDisplayQuality();
  let worst=1;
  for(const t of G.tanks){
    if(!t.unlocked) continue;
    for(const f of t.fish){
      const cond=((f.health||0)*0.6+(f.hunger||0)*0.4)/100;
      worst=Math.min(worst,cond);
    }
  }
  const risk = (1-fq)*0.7 + (1-worst)*0.3;
  return risk>0.6?'High':risk>0.35?'Medium':'Low';
}

function custTick(dtMs){
  const dt=dtMs/1000;
  for(let i=custs.length-1;i>=0;i--){
    const c=custs[i];c.bo+=dtMs*.003;
    if(c.state==='enter'||c.state==='bwalk'){
      if(moveAlong(c,c.spd*dt)){c.state='browse';if(Math.random()<.28)setTimeout(()=>{if(c.state==='browse')c.ex=true;},1000+Math.random()*2000);}
    }else if(c.state==='browse'){
      // Browsing duration (always counts down so customers eventually checkout)
      c.browseT = (c.browseT==null)? (1800+Math.random()*2600) : c.browseT;
      c.browseT -= dtMs;
      if(c.browseT<=0){setCustGoal(c,CL.ckX,CL.ckY);c.state='ckwalk';}

      // Patience (mood bar) should ONLY decrease when:
      //  - items on their list are missing from stock, OR
      //  - they have an exclamation request and the player hasn't helped yet.
      let missing=0,total=0;
      if(Array.isArray(c.list)){
        const counts={};
        for(const id of c.list){counts[id]=(counts[id]||0)+1;}
        for(const id in counts){
          total += counts[id];
          const have = (G.inv[id]||0);
          if(have < counts[id]) missing += (counts[id]-have);
        }
      }
      const missFrac = total? (missing/total):0;
      const needsHelp = (c.ex && !c.helped);

      let drain = 0;
      if(missFrac>0) drain += (0.6 + 0.8*missFrac);   // stronger drain if lots missing
      if(needsHelp)  drain += 1.0;                    // drain if player ignores request

      if(drain>0){
        c.bt -= dtMs*drain;
        if(c.bt<0) c.bt=0;
      }else{
        // optionally recover a tiny bit when everything is going well
        c.bt = Math.min(c.btMax||c.bt, c.bt + dtMs*0.04);
      }
    }else if(c.state==='ckwalk'){
      if(moveAlong(c,c.spd*dt)){c.state='ck';checkout(c);}
    }else if(c.state==='ck'){
      c.wait-=dtMs;
      if(c.wait<=0){
        c.state='leave';
        c.a = 1; // fade alpha
        // Leave via the front door (bottom gap). Aim at the doorway edge so they actually exit.
        const ex = (CL.entX||W*0.5) + (Math.random()-0.5)*30;
        const ey = H-(CHAR_RAD+8);
        setCustGoal(c, ex, ey);
      }
    }else if(c.state==='leave'){
      // Fade out while walking away from checkout so customers never get stuck at the exit.
      if(c.a==null) c.a = 1;
      c.a -= dt*0.9; // ~1.1s fade
      // Keep moving toward exit while fading
      moveAlong(c,c.spd*1.3*dt);
      if(c.a<=0){ custs.splice(i,1); }
    }
  }
}

function fishDisplayQuality(){
  // Returns 0..1 (1 = great display). Uses fish health/hunger and tank cleanliness.
  let sum=0, n=0, csum=0, tn=0;
  for(const t of G.tanks){
    if(!t.unlocked) continue;
    csum += (t.clean||0)/100; tn++;
    for(const f of t.fish){
      const q = ((f.health||0)*0.6 + (f.hunger||0)*0.4)/100;
      sum += Math.max(0,Math.min(1,q));
      n++;
    }
  }
  if(tn>0){
    const cavg = csum/tn;
    if(n===0) return Math.max(0.35,Math.min(1,cavg)); // no fish, cleanliness still matters a bit
    const favg = sum/n;
    return Math.max(0,Math.min(1, (favg*0.78 + cavg*0.22) ));
  }
  return 0.8;
}
function fishSellValue(f){
  const sp=FISH.find(s=>s.id===f.sp)||{tier:1,cost:80};
  const rMult = ({common:1,uncommon:1.6,rare:2.6,legendary:5.5}[f.rarity]||1);
  const base = Math.max(60, sp.cost||0) * (1 + (sp.tier-1)*0.7);
  const cond = (0.55 + (f.health/100)*0.35 + (f.hunger/100)*0.10); // 0.55..1.0
  const bonus = 1 + Math.max(0, (G.sat-70)/200); // happier store sells fish slightly better
  return Math.round(base * rMult * cond * bonus);
}
function sellFish(fishId,tankSlot){
  const t=G.tanks[tankSlot]; if(!t||!t.unlocked) return;
  const idx=t.fish.findIndex(x=>x.id===fishId);
  if(idx<0){notify('Fish not found.');return;}
  const f=t.fish[idx];
  const v=fishSellValue(f);
  t.fish.splice(idx,1);
  addCoins(v);
  addXP(12 + (FISH.find(s=>s.id===f.sp)?.tier||1)*6);
  spawnFloat('Sold +'+v+'🪙', W/2, H/2, '#FFD700', 1.2);
  // Selling sick fish reduces satisfaction a bit (customers notice)
  if(f.sickness) G.sat=Math.max(30,G.sat-2);
  checkMilestones();
  refreshFC();
  save();
}

function checkout(c){
  if(!G.open){ c.wait=1500; return; }

  const wms=[1800,1400,1000,800][Math.min(ul('checkout'),3)];
  const wFinal = G.staff.some(s=>s.id==='cashier') ? wms*0.5 : wms;

  let rev=0, sd=0;
  const list = Array.isArray(c.list) ? [...c.list] : genWishList(Math.max(1,ul('basket')+1));
  // Summarize wants once (optional debug / future UI)
  c.wantSummary = c.wantSummary || listToSummary(list);

  let missing=0, soldCount=0;

  // Attempt to purchase each item on the list.
  for(const pid of list){
    const p = PRODUCTS.find(x=>x.id===pid);
    if(!p){ continue; }
    const got = useInv(pid,1);
    if(got>0){
      const pr = p.price*(1+([0,.2,.4][Math.min(ul('supplier'),2)]||0));
      rev += pr*(G.sat/100*.35+.65);
      soldCount++;
      G.sold++;
      sd += 0.45;
    } else {
      missing++;
      sd -= 0.55; // mild disappointment per missing item
    }
  }

  // If they couldn't buy anything at all, they walk out.
  if(soldCount===0 && list.length>0){
    sd -= 0.8;
    spawnFloat('Out of stock…', c.x, c.y-18, '#ffb0b0', 1.05);
  }

  // Optional fish purchase
  if(c.wantsFish){
    const cand = getSaleFishCandidate();
    if(cand){
      const t = G.tanks[cand.ti];
      const f = t.fish[cand.fi];
      const fishName = (FISH.find(s=>s.id===f.sp)?.name) || 'Fish';
      // Customer fish price: premium vs direct sell value
      const saleValue = Math.round(fishSellValue(f) * 1.35);
      // Purchase probability: depends on condition, plus small random buyers
      const cond = cand.cond;
      const buyProb = Math.min(0.95, 0.20 + cond*0.65 + (Math.random()<0.05?0.25:0)); // some impulse buyers
      if(Math.random() < buyProb){
        // Remove fish from tank and add revenue
        t.fish.splice(cand.fi,1);
        rev += saleValue;
        sd += 0.9;
        spawnFloat('Sold fish +'+saleValue+'🪙', c.x, c.y-28, '#FFD700', 1.15);

        // Complaints if fish condition poor
        if(cond < 0.55 && Math.random() < (0.55 - cond)){
          const appease = Math.round(saleValue * (0.35 + (0.55-cond)*0.35));
          // Satisfaction hit + popup
          G.sat = Math.max(30, G.sat - 3);
          showComplaintPopup(appease, fishName);
        }
      }
    }
  }

  if(c.helped){ sd += 3; rev *= 1.08; }

  // Apply rush/phase multiplier
  rev *= (rushMult() || 1);

  if(rev>0){
    addCoins(rev);
    // Tips: happiness incentivizes better play
    if(G.sat>=80){
      const tip=Math.round(rev * Math.min(0.10, (G.sat-75)/500));
      if(tip>0){addCoins(tip); spawnFloat('Tip +'+tip+'🪙', c.x+12, c.y-34, '#98FB98', 1.05);}
    }
    // Track daily revenue for stats
    G.shopStats.dailyRevenue = (G.shopStats.dailyRevenue||0) + rev;
    spawnFloat('+'+~~rev+'🪙', c.x, c.y-20, '#FFD700');
  }

  // Fish display quality affects satisfaction (health, hunger, cleanliness)
  const fq = fishDisplayQuality();
  const fishSatAdj = (fq-0.82)*7; // slightly stronger impact than before

  // If many missing items, additional small satisfaction penalty
  if(missing>0) sd -= Math.min(2.2, missing*0.25);

  G.sat = Math.max(30, Math.min(100, G.sat + sd + fishSatAdj + (ul('signage')*.1)));

  c.wait = (wFinal||wms) + Math.random()*500;
  checkMilestones();
  refreshFC(); // fish count may change
}
function helpCust(id){

  c.helped=true;c.ex=false;
  G.sat=Math.min(100,G.sat+5);

// SHOP INCENTIVE SYSTEM
// ═══════════════════════════════════════════════════
// Rush Hours: 8-10am and 5-7pm — opening during these gives burst
// Restock Mode: while closed, sorting gives +50% coins
// Grand Opening: first open each day gives sat boost + customer flood
// Evening Bonus: closing after 8pm and reopening next day gives 'well-rested' sat

function getShopPhase(){
  const h=hr();
  if(h>=8&&h<10)return{name:'Morning Rush 🌅',col:'#FFD700',mult:1.5};
  if(h>=11&&h<14)return{name:'Lunch Lull 😴',col:'#999',mult:0.8};
  if(h>=17&&h<19)return{name:'Evening Rush 🌆',col:'#FF9800',mult:1.6};
  if(h>=19&&h<21)return{name:'Dinner Dip 🍽️',col:'#aaa',mult:0.75};
  if(h>=21||h<7)return{name:'After Hours 🌙',col:'#4fc3f7',mult:0};
  return{name:'Normal Hours',col:'#4CAF50',mult:1.0};
}

function toggleShop(){
  const wasOpen=G.open;
  G.open=!G.open;
  const phase=getShopPhase();
  const hNow=hr();
  const morningBoost=(hNow>=6 && hNow<8); // only grant opening boosts if you open in the morning window

  if(G.open){
    // Opening bonuses
    const bonuses=[];
    // Grand opening of the day (morning window only)
    if(morningBoost && G.shopStats.openBoostDay!==G.day){
      G.shopStats.openBoostDay=G.day;
      G.shopStats.openedToday=true;
      G.sat=Math.min(100,G.sat+10);
      bonuses.push('+10 Sat (Grand Opening!)');
      // Flood customers
      for(let i=0;i<4+~~(Math.random()*3);i++) setTimeout(()=>spawnCust(),i*600);
    }
    // Rush hour bonus
    if(phase.mult>1){
      G.shopStats.rushActive=true;
      G.shopStats.rushTimer=120*1000; // 2 real minutes of rush
      bonuses.push(phase.name+' ×'+phase.mult+' revenue!');
      G.sat=Math.min(100,G.sat+5);
      for(let i=0;i<3;i++) setTimeout(()=>spawnCust(),i*800);
    }
    // After hours penalty
    if(phase.mult===0){
      bonuses.push('After hours — few customers!');
    }
    // Promoter bonus (morning window only)
    if(morningBoost && G.shopStats.openBoostDay===G.day && G.staff.some(s=>s.id==='promoter')){
      G.sat=Math.min(100,G.sat+5);
      bonuses.push('+5 Sat (Promoter!)');
      for(let i=0;i<3;i++) setTimeout(()=>spawnCust(),i*400);
    }
    G.shopStats.restockBonus=false;
    if(!morningBoost){
      bonuses.push('No opening boost (open 6–8AM for bonuses)');
    }else if(morningBoost && G.shopStats.openBoostDay===G.day && G.shopStats.openedToday){
      bonuses.push('Opening boost already used today');
    }
    notify('🏪 Shop OPEN! '+bonuses.join(' | '));
  } else {
    // Closing bonuses
    G.shopStats.restockBonus=true; // while closed, sort gives +50%
    const closeMsg=phase.mult>1?
      '⚡ Closing during '+phase.name+'! You\'re leaving money on the table!' :
      '🔒 Shop closed. Sorting now gives +50% coins!';
    notify(closeMsg + ( (!G.open && (hr()>=22||hr()<6)) ? ' ⏩ Night Mode: time ×5, sorting ×6.' : '' ));
    if(G.staff.some(s=>s.id==='promoter')){
      notify('📣 Promoter is putting up signs for tomorrow!');
    }
  }
  document.getElementById('btn-shop').innerHTML=shopBtnLabel();
  updateAll();
}

function shopBtnLabel(){
  const phase=getShopPhase();
  if(G.open){
    const mult=G.shopStats.rushActive?'⚡ RUSH':'●';
    return `🏪 ${mult} Open`;
  }
  return G.shopStats.restockBonus?'🔒 Closed (+50% sort)':'🔒 Shop Closed';
}

// ═══════════════════════════════════════════════════
// CANVAS RENDERER — Top-Down Shop View
// ═══════════════════════════════════════════════════
let canvas,ctx,W,H,T=0;
// Render Layout (RL) — computed positions
let RL={wallH:0,tanks:[],aisles:[],cx:0,cy:0,cw:0,ch:0,solids:[]};
// Navigation grid (for robust customer pathing around shelves/counter)
let NAV={cell:16,cols:0,rows:0,walk:null,stamp:0};
function navBuild(){
  const cell = NAV.cell;
  NAV.cols = Math.max(1, Math.floor(W/cell));
  NAV.rows = Math.max(1, Math.floor(H/cell));
  NAV.walk = new Uint8Array(NAV.cols*NAV.rows);
  // Mark walkable cells by sampling the center with current collision radius.
  for(let r=0;r<NAV.rows;r++){
    for(let c=0;c<NAV.cols;c++){
      const x = c*cell + cell/2;
      const y = r*cell + cell/2;
      const ok = !circleHitsAnySolid(x,y,CHAR_RAD+1);
      NAV.walk[r*NAV.cols+c] = ok?1:0;
    }
  }
  NAV.stamp++;
}
function navIdxFromXY(x,y){
  const cell=NAV.cell;
  let c=Math.floor(x/cell), r=Math.floor(y/cell);
  c=Math.max(0,Math.min(NAV.cols-1,c));
  r=Math.max(0,Math.min(NAV.rows-1,r));
  return r*NAV.cols+c;
}
function navXYFromIdx(i){
  const cell=NAV.cell;
  const c=i%NAV.cols, r=Math.floor(i/NAV.cols);
  return {x:c*cell+cell/2, y:r*cell+cell/2};
}
function navFindPath(sx,sy,gx,gy){
  if(!NAV.walk) return null;
  const start=navIdxFromXY(sx,sy);
  const goal=navIdxFromXY(gx,gy);
  if(!NAV.walk[start] || !NAV.walk[goal]) return null;

  const cols=NAV.cols, rows=NAV.rows;
  const N=cols*rows;
  const came = new Int32Array(N); came.fill(-1);
  const gScore = new Uint16Array(N); // grid distances fit
  const inOpen = new Uint8Array(N);
  const closed = new Uint8Array(N);
  // Use large value sentinel; Uint16 wraps, so track separately
  const INF=65535;
  for(let i=0;i<N;i++) gScore[i]=INF;
  gScore[start]=0;

  // Min-heap of [f, tiebreak, idx]
  const heap=[];
  function h(i){
    const a=i%cols, b=Math.floor(i/cols);
    const ga=goal%cols, gb=Math.floor(goal/cols);
    return Math.abs(a-ga)+Math.abs(b-gb);
  }
  heap.push([h(start),0,start]); inOpen[start]=1;
  let tie=1;

  const neigh = [1,-1,cols,-cols];
  while(heap.length){
    heap.sort((A,B)=>A[0]-B[0] || A[1]-B[1]); // small heap, ok
    const cur = heap.shift()[2];
    if(closed[cur]) continue;
    if(cur===goal) break;
    closed[cur]=1;
    const curG=gScore[cur];

    const c=cur%cols, r=Math.floor(cur/cols);
    // 4-neighbors with bounds
    // right
    if(c+1<cols){
      const n=cur+1;
      if(NAV.walk[n] && !closed[n]){
        const ng=curG+1;
        if(ng<gScore[n]){
          gScore[n]=ng; came[n]=cur;
          heap.push([ng+h(n),tie++,n]);
        }
      }
    }
    // left
    if(c-1>=0){
      const n=cur-1;
      if(NAV.walk[n] && !closed[n]){
        const ng=curG+1;
        if(ng<gScore[n]){
          gScore[n]=ng; came[n]=cur;
          heap.push([ng+h(n),tie++,n]);
        }
      }
    }
    // down
    if(r+1<rows){
      const n=cur+cols;
      if(NAV.walk[n] && !closed[n]){
        const ng=curG+1;
        if(ng<gScore[n]){
          gScore[n]=ng; came[n]=cur;
          heap.push([ng+h(n),tie++,n]);
        }
      }
    }
    // up
    if(r-1>=0){
      const n=cur-cols;
      if(NAV.walk[n] && !closed[n]){
        const ng=curG+1;
        if(ng<gScore[n]){
          gScore[n]=ng; came[n]=cur;
          heap.push([ng+h(n),tie++,n]);
        }
      }
    }
  }
  if(came[goal]===-1) return null;
  // Reconstruct
  const pathIdx=[];
  let cur=goal;
  pathIdx.push(cur);
  while(cur!==start){
    cur=came[cur];
    if(cur===-1) break;
    pathIdx.push(cur);
  }
  pathIdx.reverse();

  // Convert to points and simplify: keep only turning points
  const pts=[];
  let lastDir=null;
  for(let k=0;k<pathIdx.length;k++){
    const i=pathIdx[k];
    const p=navXYFromIdx(i);
    if(k===0){ pts.push(p); continue; }
    const prev=navXYFromIdx(pathIdx[k-1]);
    const dx=Math.sign(p.x-prev.x), dy=Math.sign(p.y-prev.y);
    const dir=dx+','+dy;
    if(lastDir!==null && dir!==lastDir){
      // add the prev point as a corner
      pts.push(prev);
    }
    lastDir=dir;
  }
  pts.push(navXYFromIdx(pathIdx[pathIdx.length-1]));
  // Ensure final goal point
  pts.push({x:gx,y:gy});
  // Drop first point if very close (avoid tiny micro-step)
  if(pts.length>1){
    const p0=pts[0];
    if(Math.hypot(p0.x-sx,p0.y-sy)<NAV.cell*0.75) pts.shift();
  }
  return pts;
}

// Character visual scale + collision radius
// (Only affects visuals + collision, not economy or progression.)
const CHAR_SCALE = 1.45; // bigger customers/clerk visuals
const CHAR_RAD   = 9.5 * CHAR_SCALE; // collision radius used for customers

function rendInit(){
  canvas=document.getElementById('game-canvas');
  ctx=canvas.getContext('2d');
  rendResize();
  canvas.addEventListener('click',onCanvasClick);
  canvas.addEventListener('mousemove',onCanvasMove);
  // Touch: map touchstart → click, touchmove → hover
  canvas.addEventListener('touchstart',function(e){
    e.preventDefault();
    const t=e.changedTouches[0];
    onCanvasClick({clientX:t.clientX,clientY:t.clientY});
  },{passive:false});
  canvas.addEventListener('touchmove',function(e){
    e.preventDefault();
    const t=e.touches[0];
    onCanvasMove({clientX:t.clientX,clientY:t.clientY});
  },{passive:false});
}
function rendResize(){
  const mob=window.innerWidth<=768;
  const rp=document.getElementById('right-panel');
  const panelW=mob?0:(rp?rp.offsetWidth:268);
  const topH=mob?44:50;
  const botH=mob?60:0;
  canvas.width=W=Math.max(window.innerWidth-panelW,300);
  canvas.height=H=Math.max(window.innerHeight-topH-botH,200);
  computeRL();
}
function p(n){return Math.round(n);}

function computeRL(){
  RL.wallH=Math.floor(H*.21);
  // Counter — top left, like reference image
  RL.cx=12;RL.cy=RL.wallH+10;RL.cw=Math.floor(W*.08);RL.ch=Math.floor(H*.095);
  // Fish tanks — along top wall
  const tw=Math.floor(W*.135),th=RL.wallH-8;
  RL.tanks=[];
  for(let i=0;i<4;i++)RL.tanks.push({x:Math.floor(W*.265)+i*(tw+10),y:4,w:tw,h:th,slot:i});
  // 3 aisles — vertical shelf rows
  const aw=Math.floor(W*.135),ah=Math.floor(H*.54);
  const ax0=Math.floor(W*.268),asp=Math.floor(W*.225);
  const ay=RL.wallH+Math.floor(H*.055);
  RL.aisles=[
    {x:ax0,       y:ay,w:aw,h:ah,cats:['food','medicine'],   col:'#c8f5c0',shC:'#8ecc80',lbl:'🍽️ Food & Meds'},
    {x:ax0+asp,   y:ay,w:aw,h:ah,cats:['equipment'],         col:'#c0d0f5',shC:'#80a0d0',lbl:'⚙️ Equipment'},
    {x:ax0+asp*2, y:ay,w:aw,h:ah,cats:['decor','misc'],      col:'#f5ecc0',shC:'#d0c080',lbl:'🎨 Décor & Misc'},
  ];

  // Solid barriers (cannot be walked on)
  // Customers should browse from the side of shelves, not on top of them.
  RL.solids=[];
  // Counter
  RL.solids.push({x:RL.cx,y:RL.cy,w:RL.cw,h:RL.ch,tag:'counter'});
  // Aisle shelves
  for(const a of RL.aisles){
    RL.solids.push({x:a.x,y:a.y,w:a.w,h:a.h,tag:'shelf'});
  }
  // Fish tanks (display wall)
  for(const t of RL.tanks){
    RL.solids.push({x:t.x,y:t.y,w:t.w,h:t.h,tag:'tank'});
  }
  // Walls/bounds (soft buffer). We still clamp motion too.
  RL.solids.push({x:-999,y:-999,w:999, h:H+1998, tag:'left-wall'});
  RL.solids.push({x:W,   y:-999,w:999, h:H+1998, tag:'right-wall'});
  RL.solids.push({x:-999,y:-999,w:W+1998, h:999, tag:'top-wall'});
  // Bottom wall with a doorway gap at the entrance so customers can reach the exit point cleanly.
  const doorW = 140;
  const doorCX = CL.entX || (W*0.5);
  const doorL = doorCX - doorW/2;
  const doorR = doorCX + doorW/2;
  RL.solids.push({x:-999,y:H, w:doorL+999, h:999, tag:'bot-wall'});
  RL.solids.push({x:doorR, y:H, w:(W+1998)-doorR, h:999, tag:'bot-wall'});

  // Sync customer layout
  CL.axs=RL.aisles.map(a=>a.x+a.w/2);
  CL.ckX=RL.cx+RL.cw/2;
  CL.ckY=RL.cy+RL.ch+CHAR_RAD+10; // customers stand in front of counter
  CL.homeX=RL.cx+RL.cw/2;CL.homeY=RL.cy-CHAR_RAD-6; // cashier stands behind counter
  if(!CL.x||!CL.y){CL.x=CL.homeX;CL.y=CL.homeY;}
  CL.targetX=CL.homeX;CL.targetY=CL.homeY;
  CL.entX=W/2;CL.entY=H-28;CL.shopH=H;

  navBuild();
}

function render(dt){
  if(!canvas)return;T+=dt;
  ctx.clearRect(0,0,W,H);
  drawFloor();drawTanks();drawAisles();drawCounter();
  drawCustomers();drawCustomerTooltip();drawShelfTooltip();drawFishTooltip();drawFloats();drawPfx();
}

// ── floor & walls ────────────────────────────────
// VISUAL UPGRADE: Floor & Walls
function drawFloor(){
  // Wall — gradient from top for depth
  const wt=cosWall();
  const wallGrad=ctx.createLinearGradient(0,0,0,RL.wallH);
  wallGrad.addColorStop(0,wt.top);wallGrad.addColorStop(1,wt.bottom);
  ctx.fillStyle=wallGrad;ctx.fillRect(0,0,W,RL.wallH);
  // Wall tile panels — subtle recessed look
  const tw=Math.floor(W/Math.round(W/52));
  for(let wx=0;wx<W;wx+=tw){
    ctx.fillStyle=wt.panel||'rgba(255,255,255,.07)';ctx.fillRect(p(wx+2),4,tw-4,RL.wallH-12);
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;ctx.strokeRect(p(wx+2)+.5,4.5,tw-5,RL.wallH-13);
  }
  // Baseboard — 3d effect: dark base + light face
  ctx.fillStyle=wt.baseDark;ctx.fillRect(0,RL.wallH-6,W,6);
  ctx.fillStyle=wt.baseLight;ctx.fillRect(0,RL.wallH-6,W,2);
  ctx.fillStyle=wt.baseEdge;ctx.fillRect(0,RL.wallH-1,W,1);
  // Floor tiles — two-tone warm checkerboard with inset grout lines
  const TS=20;
  for(let ty=RL.wallH;ty<H;ty+=TS)for(let tx=0;tx<W;tx+=TS){
    const even=(Math.floor(tx/TS)+Math.floor(ty/TS))%2===0;
    const ft=cosFloor();
    ctx.fillStyle=even?ft.tileA:ft.tileB;
    ctx.fillRect(p(tx+1),p(ty+1),TS-1,TS-1);
    // Subtle inner highlight on even tiles
    if(even){ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(p(tx+2),p(ty+2),TS-4,4);}
  }
  // Grout lines
  ctx.strokeStyle=(cosFloor().grout||'#c8b888');ctx.lineWidth=1;
  for(let tx=0;tx<W;tx+=TS){ctx.beginPath();ctx.moveTo(p(tx),RL.wallH);ctx.lineTo(p(tx),H);ctx.stroke();}
  for(let ty=RL.wallH;ty<H;ty+=TS){ctx.beginPath();ctx.moveTo(0,p(ty));ctx.lineTo(W,p(ty));ctx.stroke();}
  // Ambient floor darkening near walls (depth)
  const floorShadow=ctx.createLinearGradient(0,RL.wallH,0,RL.wallH+40);
  floorShadow.addColorStop(0,'rgba(0,0,0,.18)');floorShadow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=floorShadow;ctx.fillRect(0,RL.wallH,W,40);
}

// VISUAL UPGRADE: Fish Tanks
function drawTanks(){
  RL.tanks.forEach((tl,i)=>{
    if(i>=G.tanksN){
      // Locked tank — frosted glass look
      ctx.fillStyle='rgba(30,40,60,.6)';ctx.fillRect(p(tl.x),p(tl.y),tl.w,tl.h);
      ctx.strokeStyle='#384860';ctx.lineWidth=2;ctx.strokeRect(p(tl.x)+1,p(tl.y)+1,tl.w-2,tl.h-2);
      // Inner frost
      ctx.fillStyle='rgba(100,140,200,.06)';ctx.fillRect(p(tl.x+3),p(tl.y+3),tl.w-6,tl.h-6);
      ctx.font='11px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillText('🔒',p(tl.x+tl.w/2),p(tl.y+tl.h/2));
      return;
    }
    const tank=G.tanks[i];

    // Drop shadow under tank
    ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(p(tl.x+3),p(tl.y+tl.h+1),tl.w-2,4);

    // Outer tank frame — dark border
    ctx.fillStyle='#1a2a3c';ctx.fillRect(p(tl.x),p(tl.y),tl.w,tl.h);

    // Water body — gradient
    const wg=ctx.createLinearGradient(tl.x,tl.y+8,tl.x,tl.y+tl.h-6);
    wg.addColorStop(0,'#1a5a8a');wg.addColorStop(.5,'#0e3f6a');wg.addColorStop(1,'#0a2a48');
    ctx.fillStyle=wg;ctx.fillRect(p(tl.x+3),p(tl.y+8),tl.w-6,tl.h-14);

    // Dirty tint
    if(tank.clean<50){
      ctx.fillStyle=`rgba(110,80,20,${.4*(1-tank.clean/50)})`;
      ctx.fillRect(p(tl.x+3),p(tl.y+8),tl.w-6,tl.h-14);
    }

    // Caustic shimmer lines
    for(let s=0;s<3;s++){
      const sx=tl.x+4+s*(tl.w/3)+Math.sin(T*.002+s+i*1.3)*3;
      ctx.strokeStyle=`rgba(120,210,255,${.06+Math.sin(T*.003+s)*.03})`;
      ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(p(sx),p(tl.y+8));ctx.lineTo(p(sx+3),p(tl.y+tl.h-6));ctx.stroke();
    }

    // Gravel — layered with pebbles
    ctx.fillStyle='#5a3f1a';ctx.fillRect(p(tl.x+3),p(tl.y+tl.h-8),tl.w-6,6);
    // Pebble highlights
    for(let g=0;g<Math.floor(tl.w/6);g++){
      const gx=tl.x+4+g*5+Math.sin(g*1.7)*.5;
      const gc2=(g%3===0)?'#8a6a3a':(g%3===1)?'#6a5228':'#4a3818';
      ctx.fillStyle=gc2;
      ctx.beginPath();ctx.ellipse(p(gx),p(tl.y+tl.h-5),1.5,1,0,0,Math.PI*2);ctx.fill();
    }

    // Bubbles — with shimmer
    for(let b=0;b<4;b++){
      const bx=tl.x+5+b*(tl.w/4.5)+Math.sin(T*.003+b+i)*2;
      const by=tl.y+8+((T*.022+b*16+i*28)%(tl.h-16));
      const br=1+Math.sin(T*.01+b)*.3;
      ctx.beginPath();ctx.arc(p(bx),p(by),br,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,230,255,.55)`;ctx.fill();
      ctx.strokeStyle='rgba(220,245,255,.8)';ctx.lineWidth=.5;ctx.stroke();
    }

    // Fish
    tank.fish.forEach((f,fi)=>drawFish(f,tl,fi,tank.fish.length));

    // Eggs (visible clusters)
    if(tank.eggs.length){
      for(const e of tank.eggs){
        const nx = (e.nx==null?0.5:e.nx), ny=(e.ny==null?0.75:e.ny);
        const cx = tl.x + 8 + nx*(tl.w-16);
        const cy = tl.y + 10 + ny*(tl.h-24);
        const n = e.n||3;
        for(let k=0;k<n;k++){
          const ox = Math.cos((k/n)*Math.PI*2 + (T*0.002)) * 6;
          const oy = Math.sin((k/n)*Math.PI*2 + (T*0.002)) * 4;
          ctx.beginPath();ctx.arc(p(cx+ox),p(cy+oy),2.2,0,Math.PI*2);
          ctx.fillStyle='rgba(245,245,255,.92)';ctx.fill();
          ctx.strokeStyle='rgba(120,160,200,.55)';ctx.lineWidth=.6;ctx.stroke();
        }
      }
    }

    // Glass frame — thick border with inner highlight
    ctx.strokeStyle='#2a4a6a';ctx.lineWidth=3;ctx.strokeRect(p(tl.x)+1,p(tl.y)+1,tl.w-2,tl.h-2);
    ctx.strokeStyle='rgba(100,200,255,.45)';ctx.lineWidth=1;ctx.strokeRect(p(tl.x+2),p(tl.y+2),tl.w-4,tl.h-4);
    // Glass reflection strip (top-left corner)
    ctx.fillStyle='rgba(200,240,255,.12)';ctx.fillRect(p(tl.x+3),p(tl.y+8),4,tl.h-16);
    // Water surface shimmer
    for(let sw=0;sw<tl.w-6;sw+=4){
      const sh=Math.sin(T*.004+sw*.1+i)*.8+.8;
      ctx.fillStyle=`rgba(140,220,255,${.08+sh*.04})`;ctx.fillRect(p(tl.x+3+sw),p(tl.y+8),3,sh+1);
    }

    // Feed status dots — pill-shaped
    const dotY=tl.y+tl.h+2;
    ctx.fillStyle=tank.fedAM?'#3dcc5a':'#e03030';
    ctx.beginPath();ctx.roundRect(p(tl.x),p(dotY),6,3,1.5);ctx.fill();
    ctx.fillStyle=tank.fedPM?'#3dcc5a':'#666';
    ctx.beginPath();ctx.roundRect(p(tl.x+8),p(dotY),6,3,1.5);ctx.fill();

    // Cleanliness bar — rounded
    const bw=tl.w-4;
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.roundRect(p(tl.x+2),p(tl.y+tl.h+6),bw,4,2);ctx.fill();
    const cc=tank.clean>60?'#3dcc5a':tank.clean>30?'#ffaa00':'#e03030';
    ctx.fillStyle=cc;ctx.beginPath();ctx.roundRect(p(tl.x+2),p(tl.y+tl.h+6),Math.max(4,p(bw*tank.clean/100)),4,2);ctx.fill();

    // Label
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(p(tl.x),p(tl.y+tl.h+11),tl.w,10);
    ctx.fillStyle='#a8dcf0';ctx.font='bold 7px Nunito,sans-serif';ctx.textAlign='center';
    ctx.fillText('Tank '+(i+1),p(tl.x+tl.w/2),p(tl.y+tl.h+18));
  });
  ctx.textAlign='left';
}

// VISUAL UPGRADE: drawFish — tiny pixel-art fish sprites in tank overview
function drawFish(fish,tl,fi,total){
  const cols=Math.max(1,Math.ceil(Math.sqrt(total)));
  const col=fi%cols,row=~~(fi/cols);
  const zw=(tl.w-8)/cols,zh=(tl.h-18)/Math.ceil(total/cols);
  const bx=tl.x+4+col*zw+zw/2, by=tl.y+11+row*zh+zh/2;
  let dx=Math.sin(T*.002+fish.ao)*Math.min(zw*.3,10);
  let dy=Math.cos(T*.0015+fish.ao)*Math.min(zh*.25,5);
  let tilt=0,jx=0,jy=0;
  if(fish.sickness==='swimblad'){tilt=Math.sin(T*.003)*.65;dy+=Math.sin(T*.007)*3.5;}
  if(fish.sickness==='stress'&&Math.random()<.04){jx=(Math.random()-.5)*8;jy=(Math.random()-.5)*8;}
  const fx=bx+dx+jx,fy=by+dy+jy;
  const dir=(dx>=0)?1:-1;
  const cl=gc(fish.cg); // use gene colour palette

  ctx.save();ctx.translate(p(fx),p(fy));ctx.rotate(tilt);ctx.scale(dir,1);

  // Disease overlays (unchanged mechanics, same visuals as before just on new sprite)
  if(fish.sickness==='ich'){
    for(let s=0;s<5;s++){
      const sx=Math.cos(T*.05+s*1.26)*7,sy=Math.sin(T*.04+s*1.26)*4.5;
      ctx.fillStyle=`rgba(255,255,255,${.5+Math.sin(T*.12+s)*.4})`;
      ctx.beginPath();ctx.arc(sx,sy,1.4,0,Math.PI*2);ctx.fill();
    }
  }
  if(fish.sickness==='fungal'){
    const rad=7+Math.sin(T*.006)*2.5,al=.25+Math.sin(T*.008)*.15;
    const g=ctx.createRadialGradient(0,0,2,0,0,rad);
    g.addColorStop(0,`rgba(220,210,255,${al})`);g.addColorStop(1,'rgba(200,200,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,rad,0,Math.PI*2);ctx.fill();
  }

  // Fin rot tint
  if(fish.sickness==='finrot') ctx.filter='sepia(.7) hue-rotate(280deg) saturate(2)';

  // Body — oval
  ctx.fillStyle=cl.body;ctx.beginPath();ctx.ellipse(0,0,5,3.5,0,0,Math.PI*2);ctx.fill();
  // Belly highlight
  ctx.fillStyle=cl.belly;ctx.beginPath();ctx.ellipse(1,0.5,2.5,1.5,0,0,Math.PI*2);ctx.fill();
  // Pattern overlay
  if(fish.pg==='spotted'){ctx.fillStyle=cl.stripe;ctx.beginPath();ctx.arc(-1,-.5,1.2,0,Math.PI*2);ctx.fill();}
  if(fish.pg==='striped'){ctx.fillStyle=cl.stripe+'aa';ctx.fillRect(-1,-3,1.5,6);}
  // Tail fin — animated
  const tf=Math.sin(T*.006+fish.ao)*.8;
  ctx.fillStyle=cl.fin;
  ctx.beginPath();ctx.moveTo(5,0);ctx.lineTo(8,-2.5+tf);ctx.lineTo(8,2.5-tf);ctx.closePath();ctx.fill();
  // Dorsal fin
  ctx.fillStyle=cl.fin+'cc';
  ctx.beginPath();ctx.moveTo(-1,-3.5);ctx.lineTo(1,-5.5);ctx.lineTo(3,-3.5);ctx.closePath();ctx.fill();
  // Outline
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=.6;ctx.beginPath();ctx.ellipse(0,0,5,3.5,0,0,Math.PI*2);ctx.stroke();
  // Eye
  ctx.filter='none';
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-3,-0.5,1.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-3,-.5,.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-3.3,-.8,.35,0,Math.PI*2);ctx.fill();

  // Fin rot dark edge
  if(fish.sickness==='finrot'){
    ctx.fillStyle=`rgba(80,0,0,${.3+Math.sin(T*.005)*.15})`;ctx.fillRect(3,-3.5,3,7);
  }

  // Health dot — only when below 60
  if(fish.health<60){
    ctx.fillStyle=fish.health<30?'#f44':'#fa0';
    ctx.beginPath();ctx.arc(4,-5,1.8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.5;ctx.stroke();
  }
  ctx.restore();
}

// VISUAL UPGRADE: Aisles / Shelves
function drawAisles(){
  // Aisle drop shadows first (drawn behind everything)
  RL.aisles.forEach(a=>{
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.fillRect(p(a.x+4),p(a.y+a.h),a.w-2,6);
  });

  RL.aisles.forEach(a=>{
    // Shelf unit side face (right side — gives 3D depth)
    ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(p(a.x+a.w),p(a.y+4),5,a.h);

    // Main shelf body — warm wood gradient
    const bg=ctx.createLinearGradient(a.x,a.y,a.x+a.w,a.y);
    bg.addColorStop(0,a.col);bg.addColorStop(.85,a.col);bg.addColorStop(1,'rgba(0,0,0,.08)');
    ctx.fillStyle=bg;ctx.fillRect(p(a.x),p(a.y),a.w,a.h);

    // Outer border — dark wood
    ctx.strokeStyle='rgba(60,35,10,.55)';ctx.lineWidth=2;
    ctx.strokeRect(p(a.x)+1,p(a.y)+1,a.w-2,a.h-2);

    // Inner highlight on left edge
    ctx.fillStyle='rgba(255,255,255,.14)';ctx.fillRect(p(a.x+2),p(a.y+2),3,a.h-4);

    const rows=4,rowH=~~((a.h-14)/rows);
    a.cats.forEach((cat,ci)=>{
      const rfc=~~(rows/a.cats.length);
      for(let ri=0;ri<rfc;ri++){
        const rIdx=ci*rfc+ri;
        const sy=a.y+8+rIdx*(rowH+3);

        // Shelf board — top surface lighter, bottom darker
        const sg=ctx.createLinearGradient(a.x,sy,a.x,sy+rowH);
        sg.addColorStop(0,a.shC);sg.addColorStop(.3,a.shC);sg.addColorStop(1,'rgba(0,0,0,.18)');
        ctx.fillStyle=sg;ctx.fillRect(p(a.x+3),p(sy),a.w-6,rowH);

        // Shelf top highlight
        ctx.fillStyle='rgba(255,255,255,.22)';ctx.fillRect(p(a.x+3),p(sy),a.w-6,2);
        // Shelf front lip (bottom edge)
        ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(p(a.x+3),p(sy+rowH-2),a.w-6,3);
        // Shelf underside shadow
        ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(p(a.x+3),p(sy-2),a.w-6,2);

        // Products
        const catP=PRODUCTS.filter(q=>q.cat===cat&&q.unlocked);
        let px2=a.x+5;
        catP.slice(0,5).forEach(q=>{
          if((G.inv[q.id]||0)>0){
            const ps=Math.min(rowH-5,13);
            const py2=sy+3;
            // Product shadow
            ctx.fillStyle='rgba(0,0,0,.15)';ctx.fillRect(p(px2+1),p(py2+1),ps,ps);
            // Product body
            ctx.fillStyle=q.color||'#aaa';ctx.fillRect(p(px2),p(py2),ps,ps);
            // Product shine
            ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillRect(p(px2),p(py2),ps,Math.ceil(ps*.35));
            // Product border
            ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.8;
            ctx.strokeRect(p(px2)+.5,p(py2)+.5,ps-1,ps-1);
            // Emoji icon
            ctx.font=`${Math.max(7,ps-3)}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText(q.emoji,p(px2+ps/2),p(py2+ps/2+1));
            px2+=15;
          }
        });

        // Stock count badge
        const tot=catP.reduce((s,q)=>s+(G.inv[q.id]||0),0);
        ctx.font='bold 7px Nunito,sans-serif';ctx.textAlign='right';
        if(tot>0){
          // Green badge
          ctx.fillStyle='rgba(30,80,30,.7)';ctx.beginPath();ctx.roundRect(p(a.x+a.w-18),p(sy+rowH/2-5),16,10,3);ctx.fill();
          ctx.fillStyle='#8eff8e';ctx.fillText(''+tot,p(a.x+a.w-4),p(sy+rowH/2+1));
        }else{
          // Red empty badge
          ctx.fillStyle='rgba(80,20,20,.7)';ctx.beginPath();ctx.roundRect(p(a.x+a.w-26),p(sy+rowH/2-5),24,10,3);ctx.fill();
          ctx.fillStyle='#ff8888';ctx.fillText('EMPTY',p(a.x+a.w-4),p(sy+rowH/2+1));
        }
      }
    });

    // Aisle label — inset panel at bottom
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(p(a.x+1),p(a.y+a.h-14),a.w-2,13);
    ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 8px Nunito,sans-serif';ctx.textAlign='center';
    ctx.fillText(a.lbl,p(a.x+a.w/2),p(a.y+a.h-5));ctx.textAlign='left';
  });
}

// VISUAL UPGRADE: Counter & Clerk
function drawCounter(){
  const{cx,cy,cw,ch}=RL;
  // Drop shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(p(cx+4),p(cy+ch),cw-2,6);
  // Side face (right side, dark)
  ctx.fillStyle='#5a3a08';ctx.fillRect(p(cx+cw),p(cy+4),5,ch);
  // Counter body — warm wood gradient
  const cg=ctx.createLinearGradient(cx,cy,cx+cw,cy);
  cg.addColorStop(0,'#a07820');cg.addColorStop(.5,'#8B6914');cg.addColorStop(1,'#6a4e0e');
  ctx.fillStyle=cg;ctx.fillRect(p(cx),p(cy),cw,ch);
  // Counter top surface — lighter
  const ctg=ctx.createLinearGradient(cx,cy,cx,cy+10);
  ctg.addColorStop(0,'#d4a840');ctg.addColorStop(1,'#b88a20');
  ctx.fillStyle=ctg;ctx.fillRect(p(cx),p(cy),cw,10);
  // Top highlight
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(p(cx+2),p(cy+1),cw-4,3);
  // Wood grain lines
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
  for(let gy=0;gy<ch;gy+=8){ctx.beginPath();ctx.moveTo(p(cx),p(cy+gy));ctx.lineTo(p(cx+cw),p(cy+gy+3));ctx.stroke();}
  // Border
  ctx.strokeStyle='rgba(40,20,0,.5)';ctx.lineWidth=2;ctx.strokeRect(p(cx)+1,p(cy)+1,cw-2,ch-2);

  // Register body
  const rx=cx+8,ry=cy+13;
  ctx.fillStyle='#1e1e1e';ctx.beginPath();ctx.roundRect(p(rx),p(ry),28,20,3);ctx.fill();
  // Screen
  const sg2=ctx.createLinearGradient(rx+2,ry+2,rx+2,ry+13);
  sg2.addColorStop(0,'#004400');sg2.addColorStop(1,'#002200');
  ctx.fillStyle=sg2;ctx.beginPath();ctx.roundRect(p(rx+2),p(ry+2),24,11,2);ctx.fill();
  // Screen glow
  ctx.fillStyle=G.open?'#00ee44':'#ee4400';ctx.font='5px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(G.open?'OPEN':'CLSD',p(rx+14),p(ry+8));
  // Screen reflection
  ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(p(rx+2),p(ry+2),24,3);
  // Buttons row
  ['#ffee44','#44ff44','#ff4444'].forEach((c,k)=>{
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.arc(p(rx+7+k*8),p(ry+16),4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(p(rx+7+k*8),p(ry+16),3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(p(rx+6+k*8),p(ry+15),1.2,0,Math.PI*2);ctx.fill();
  });

  drawClerk(CL.x,CL.y);
  // Checkout label
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(p(cx+1),p(cy+ch),cw-1,11);
  ctx.fillStyle='rgba(255,220,120,.9)';ctx.font='bold 7px Nunito,sans-serif';ctx.textAlign='center';
  ctx.fillText('CHECKOUT',p(cx+cw/2),p(cy+ch+8));ctx.textAlign='left';
}
function drawClerk(x,y){
  // Cashier uses same visual scale and proportions as customers.
  ctx.save();
  ctx.translate(p(x),p(y));
  ctx.scale(CHAR_SCALE,CHAR_SCALE);

  // Subtle floor shadow
  ctx.fillStyle='rgba(0,0,0,.14)';
  ctx.beginPath();ctx.ellipse(0,15,9,3,0,0,Math.PI*2);ctx.fill();

  // Shoes
  ctx.fillStyle='#2a1a08';
  ctx.fillRect(-6,13,5,3);ctx.fillRect(1,13,5,3);
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillRect(-6,13,5,1);ctx.fillRect(1,13,5,1);

  // Legs
  ctx.fillStyle='#4a4a4a';
  ctx.fillRect(-5,7,4,7);ctx.fillRect(1,7,4,7);

  // Body (uniform + apron)
  ctx.fillStyle='#3a5a8a';
  ctx.beginPath();ctx.roundRect(-6,-7,12,15,2);ctx.fill();
  // Apron front
  ctx.fillStyle='#2a4a7a';
  ctx.fillRect(-3,-3,6,10);
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillRect(-1,-2,2,8);
  // Body shading
  ctx.fillStyle='rgba(255,255,255,.16)';ctx.fillRect(-5,-6,5,4);
  ctx.fillStyle='rgba(0,0,0,.10)';ctx.fillRect(-6,4,12,4);

  // Neck
  ctx.fillStyle='#f5c8a0';ctx.fillRect(-2,-7,4,3);

  // Head
  ctx.fillStyle='#f5c8a0';
  ctx.beginPath();ctx.roundRect(-5,-18,10,11,2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.10)';ctx.fillRect(-4,-8,8,2);

  // Hair
  ctx.fillStyle='#5a3010';
  ctx.beginPath();ctx.roundRect(-5,-18,10,3,1);ctx.fill();
  ctx.fillStyle='#6a3a14';
  ctx.fillRect(-5,-15,2,4);ctx.fillRect(3,-15,2,4);

  // Eyes + smile
  ctx.fillStyle='#222';ctx.fillRect(-2,-14,1,1);ctx.fillRect(1,-14,1,1);
  ctx.strokeStyle='#c08060';ctx.lineWidth=.8;
  ctx.beginPath();ctx.arc(0,-12,1.5,0,Math.PI);ctx.stroke();

  // Arms
  ctx.fillStyle='#3a5a8a';
  ctx.fillRect(-7,-1,2,6);ctx.fillRect(5,-1,2,6);
  ctx.fillStyle='#f5c8a0';
  ctx.fillRect(-8,4,2,2);ctx.fillRect(6,4,2,2);

  ctx.restore();
