// Solid-barrier moveTo — customers cannot walk through counters/shelves/tanks.
// Allows natural "slide" along edges so they can reach shelf sides.
function moveTo(c,tx,ty,spd){
  const dx=tx-c.x,dy=ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
  if(d<spd){
    // Snap only if the target isn't inside a solid.
    if(!circleHitsAnySolid(tx,ty,CHAR_RAD)) {c.x=tx;c.y=ty;return true;}
  }
  const nx=dx/d, ny=dy/d;
  const stepX=nx*spd, stepY=ny*spd;

  // Attempt X then Y for sliding collision
  let nxPos=c.x+stepX, nyPos=c.y;
  if(!circleHitsAnySolid(nxPos,nyPos,CHAR_RAD)) c.x=nxPos;
  else {
    // If blocked, nudge slightly away from nearest solid edge to avoid jitter
    const push = pushOutOfSolids(c.x, c.y, CHAR_RAD);
    c.x += push.px;
  }

  nxPos=c.x; nyPos=c.y+stepY;
  if(!circleHitsAnySolid(nxPos,nyPos,CHAR_RAD)) c.y=nyPos;
  else {
    const push = pushOutOfSolids(c.x, c.y, CHAR_RAD);
    c.y += push.py;
  }

  // Clamp to canvas safe area
  c.x = clamp(c.x, CHAR_RAD+2, W-(CHAR_RAD+2));
  // Allow leavers to touch the bottom edge (doorway) without getting pinned by clamp.
  const yMax = (c && c.state==='leave') ? (H-(CHAR_RAD+6)) : (H-(CHAR_RAD+2));
  c.y = clamp(c.y, RL.wallH+(CHAR_RAD+2), yMax);

  return false;
}


// Move helper that can ignore one solid tag (used for cashier behind the counter).
function moveToIgnore(c,tx,ty,spd,ignoreTag){
  const dx=tx-c.x,dy=ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
  if(d<spd){
    if(!circleHitsAnySolid(tx,ty,CHAR_RAD,ignoreTag)) {c.x=tx;c.y=ty;return true;}
  }
  const nx=dx/d, ny=dy/d;
  const stepX=nx*spd, stepY=ny*spd;

  let nxPos=c.x+stepX, nyPos=c.y;
  if(!circleHitsAnySolid(nxPos,nyPos,CHAR_RAD,ignoreTag)) c.x=nxPos;
  else { const push = pushOutOfSolids(c.x,c.y,CHAR_RAD,ignoreTag); c.x += push.px; }

  nxPos=c.x; nyPos=c.y+stepY;
  if(!circleHitsAnySolid(nxPos,nyPos,CHAR_RAD,ignoreTag)) c.y=nyPos;
  else { const push = pushOutOfSolids(c.x,c.y,CHAR_RAD,ignoreTag); c.y += push.py; }

  c.x = clamp(c.x, CHAR_RAD+2, W-(CHAR_RAD+2));
  c.y = clamp(c.y, RL.wallH+(CHAR_RAD+2), H-(CHAR_RAD+2));
  return false;
}
// ── simple path routing (avoids aisle dead-ends) ─────────────────────────────
// Customers were getting stuck when trying to navigate around large solid shelves.
// This lightweight router creates 2–3 waypoints that go around aisles via the bottom corridor.
function segmentBlocked(x1,y1,x2,y2){
  const steps = Math.max(6, Math.ceil(Math.hypot(x2-x1,y2-y1)/18));
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const x=x1+(x2-x1)*t, y=y1+(y2-y1)*t;
    if(circleHitsAnySolid(x,y,CHAR_RAD)) return true;
  }
  return false;
}
function bottomCorridorY(){
  if(!RL.aisles || !RL.aisles.length) return H-40;
  const a=RL.aisles[0];
  return Math.min(H-(CHAR_RAD+6), a.y + a.h + 26);
}
function inLeftZone(x){
  return x < (RL.aisles?.[0]?.x || (W*0.25)) - 8;
}

function findNearestFreePoint(x,y){
  // Small spiral search for a reachable goal that isn't inside a solid.
  if(!circleHitsAnySolid(x,y,CHAR_RAD)) return {x,y};
  const step = 6;
  for(let r=step; r<=120; r+=step){
    for(let a=0; a<Math.PI*2; a+=Math.PI/8){
      const nx = x + Math.cos(a)*r;
      const ny = y + Math.sin(a)*r;
      if(!circleHitsAnySolid(nx,ny,CHAR_RAD)) return {x:nx,y:ny};
    }
  }
  // As a fallback, clamp into bounds and hope for the best.
  return {x: clamp(x, CHAR_RAD+6, W-(CHAR_RAD+6)), y: clamp(y, RL.wallH+(CHAR_RAD+6), H-(CHAR_RAD+6))};
}
function setCustGoal(c, gx, gy){
  const g = findNearestFreePoint(gx,gy);
  c.gx=g.x; c.gy=g.y;
  c.path = planPath(c.x,c.y,c.gx,c.gy);
  const w = c.path[0];
  c.tx=w.x; c.ty=w.y;
}
function planPath(sx,sy,gx,gy){
  // Special-case: leaving the store (goal near bottom) routes via safe lane to avoid shelf corner jams.
  if(gy >= H-70){
    const by = bottomCorridorY();
    const laneX = RL.cx + RL.cw + 34;
    const xSafe = clamp(laneX, CHAR_RAD+6, W-(CHAR_RAD+6));
    // Go to safe lane, then down corridor, then to exit.
    if(!segmentBlocked(sx,sy,xSafe,sy) && !segmentBlocked(xSafe,sy,xSafe,by) && !segmentBlocked(xSafe,by,gx,by)){
      return [{x:xSafe,y:sy},{x:xSafe,y:by},{x:gx,y:by},{x:gx,y:gy}];
    }
  }

  // Direct if not blocked
  if(!segmentBlocked(sx,sy,gx,gy)) return [{x:gx,y:gy}];

  const by = bottomCorridorY();
  const leftStart = inLeftZone(sx), leftGoal = inLeftZone(gx);

  // If crossing between left zone and aisle zone, route through a safe X then bottom corridor.
// This prevents corner-jams at the bottom-left of the first aisle.
  if(leftStart !== leftGoal){
    const safeX = clamp((RL.aisles?.[0]?.x || (W*0.25)) - (CHAR_RAD+18), CHAR_RAD+6, W-(CHAR_RAD+6));
    const cand = [{x:safeX,y:sy},{x:safeX,y:by},{x:gx,y:by},{x:gx,y:gy}];
    let ok=true, px=sx,py=sy;
    for(const pt of cand){ if(segmentBlocked(px,py,pt.x,pt.y)){ ok=false; break; } px=pt.x; py=pt.y; }
    if(ok) return cand;
    // fall through to nav fallback
  }

  // Otherwise try a simple "go down then to goal" to dodge shelf corners.
  if(!segmentBlocked(sx,sy,sx,by) && !segmentBlocked(sx,by,gx,by) && !segmentBlocked(gx,by,gx,gy)){
    return [{x:sx,y:by},{x:gx,y:by},{x:gx,y:gy}];
  }

  // Fallback: go to a lateral lane just right of the counter (usually open), then to goal
  const laneX = RL.cx + RL.cw + 22;
  const laneY = Math.max(RL.wallH + 22, Math.min(by, gy));
  const pts=[{x:laneX,y:sy},{x:laneX,y:laneY},{x:gx,y:laneY},{x:gx,y:gy}];
  // prune points that are clearly blocked
  const out=[];
  let px=sx,py=sy;
  for(const pt of pts){
    if(!segmentBlocked(px,py,pt.x,pt.y)) {out.push(pt); px=pt.x; py=pt.y;}
  }
  if(!segmentBlocked(px,py,gx,gy)) out.push({x:gx,y:gy});
  // Grid nav fallback (robust around corners/aisles)
  const nav = navFindPath(sx,sy,gx,gy);
  if(nav) return nav;
  return out.length?out:[{x:gx,y:gy}];
}
function moveAlong(c, spd){
  // Ensure target exists
  if(c.tx==null||c.ty==null){ setCustGoal(c,c.gx||c.x,c.gy||c.y); }
  const reached = moveTo(c,c.tx,c.ty,spd);
  if(reached){
    if(c.path && c.path.length>1){
      c.path.shift();
      c.tx=c.path[0].x; c.ty=c.path[0].y;
      return false;
    }
    return true;
  }
  // If blocked too long, replan (helps when near shelf corners)
  c.stuck = (c.stuck||0) + 1;
  if(c.stuck>25){
    c.stuck=0;
    if(c.gx!=null && c.gy!=null) setCustGoal(c,c.gx,c.gy);
  }
  return false;
}

function circleHitsAnySolid(x,y,r,ignoreTag){
  if(!RL.solids||!RL.solids.length) return false;
  for(const s of RL.solids){
    if(ignoreTag && s.tag===ignoreTag) continue;
    if(circleRectHit(x,y,r,s.x,s.y,s.w,s.h)) return true;
  }
  return false;
}

function circleRectHit(cx,cy,r,rx,ry,rw,rh){
  // Closest point on rect to circle center
  const px = clamp(cx, rx, rx+rw);
  const py = clamp(cy, ry, ry+rh);
  const dx = cx - px, dy = cy - py;
  return (dx*dx + dy*dy) < (r*r);
}

function pushOutOfSolids(x,y,r,ignoreTag){
  // Small, stable push away from the deepest overlap to prevent sticking.
  let best=null;
  if(!RL.solids) return {px:0,py:0};
  for(const s of RL.solids){
    // Skip outer pseudo-walls (they're already handled by clamp)
    if(String(s.tag||'').includes('wall')) continue;
    if(ignoreTag && s.tag===ignoreTag) continue;
    const px = clamp(x, s.x, s.x+s.w);
    const py = clamp(y, s.y, s.y+s.h);
    const dx = x - px, dy = y - py;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const pen = r - dist;
    if(pen>0 && (!best || pen>best.pen)) best={pen,dx,dy,dist};
  }
  if(!best) return {px:0,py:0};
  const ux = (best.dist>0? (best.dx/best.dist) : 0);
  const uy = (best.dist>0? (best.dy/best.dist) : -1);
  const amt = Math.min(1.4, best.pen+0.2);
  return {px:ux*amt, py:uy*amt};
}
// VISUAL UPGRADE: Floating text — drop shadow + smooth easing
function drawFloats(){
  G.floats=G.floats.filter(f=>f.life>0);
  G.floats.forEach(f=>{
    const ease=f.life*f.life;
    ctx.globalAlpha=ease;
    const sz=p((10+(1-f.life)*2)*(f.sz||1));
    ctx.font=`bold ${sz}px Nunito,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillText(f.txt,p(f.x)+1,p(f.y)+1);
    ctx.fillStyle=f.col;ctx.fillText(f.txt,p(f.x),p(f.y));
    f.y+=f.vy;f.vy*=.97;f.life-=.016;
  });ctx.globalAlpha=1;ctx.textAlign='left';
}
// VISUAL UPGRADE: Particles — mixed circles + diamond sparkles
function drawPfx(){
  G.particles=G.particles.filter(f=>f.life>0);
  G.particles.forEach((f,i)=>{
    ctx.globalAlpha=f.life*f.life;ctx.fillStyle=f.col;
    if(i%3===0){
      ctx.save();ctx.translate(p(f.x),p(f.y));ctx.rotate(T*.015+i);
      const s=f.sz*f.life*.8;
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s,0);ctx.lineTo(0,s);ctx.lineTo(-s,0);ctx.closePath();ctx.fill();
      ctx.restore();
    }else{ctx.beginPath();ctx.arc(p(f.x),p(f.y),f.sz*f.life,0,Math.PI*2);ctx.fill();}
    f.x+=f.vx;f.y+=f.vy;f.vy+=.08;f.vx*=.96;f.life-=.022;
  });ctx.globalAlpha=1;
}

let hoverShelf=null; // aisle/shelf hover info

function custHoverAt(mx,my){
  // Closest customer within a soft radius (works for all customers)
  let best=null, bd=1e9;
  for(const c of custs){
    const dx=mx-c.x, dy=my-c.y;
    const d=dx*dx+dy*dy;
    const hr = 22*CHAR_SCALE;
    if(d<hr*hr && d<bd){ bd=d; best=c; }
  }
  return best;
}

function shelfHoverAt(mx,my){
  // Hover over aisle shelf zones (for tooltip)
  if(!RL || !RL.aisles) return null;
  for(const a of RL.aisles){
    if(mx>=a.x && mx<=a.x+a.w && my>=a.y && my<=a.y+a.h){
      return a;
    }
  }
  return null;
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ── canvas events ────────────────────────────────
function onCanvasClick(e){
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const cid=custAt(mx,my);if(cid!==null){helpCust(cid);return;}
  RL.tanks.forEach((tl,i)=>{if(i<G.tanksN&&mx>=tl.x&&mx<=tl.x+tl.w&&my>=tl.y&&my<=tl.y+tl.h)openTankView(i);});
}
function onCanvasMove(e){
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  hoverMX=mx; hoverMY=my;
  hoverCust=custHoverAt(mx,my);
  hoverShelf = hoverCust ? null : shelfHoverAt(mx,my);
  hoverFish = (hoverCust||hoverShelf) ? null : fishHoverAt(mx,my);

  // Pointer if hovering a customer, a shelf zone, or a tank
  let ptr=!!hoverCust || !!hoverShelf || !!hoverFish;
  if(!ptr) RL.tanks.forEach((tl,i)=>{ if(i<G.tanksN&&mx>=tl.x&&mx<=tl.x+tl.w&&my>=tl.y&&my<=tl.y+tl.h) ptr=true; });

  canvas.style.cursor=ptr?'pointer':'default';
}


function drawShelfTooltip(){
  if(!hoverShelf) return;
  const a=hoverShelf;
  const pad=10;
  const cats = Array.isArray(a.cats) ? a.cats : [];
  const lines=[];
  for(const cat of cats){
    const inv=catInv(cat);
    const cap=shelfCap(cat);
    lines.push({cat, inv, cap});
  }
  const title = (cats.length===1 ? (cats[0][0].toUpperCase()+cats[0].slice(1)) : (cats.map(c=>c[0].toUpperCase()+c.slice(1)).join(' & '))) + " Shelf";
  const w=260;
  const h=pad*2 + 20 + lines.length*18 + 14;
  let x=hoverMX+14, y=hoverMY+14;
  if(x+w>W-10) x=W-w-10;
  if(y+h>H-10) y=H-h-10;

  ctx.save();
  ctx.globalAlpha=0.96;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  roundRect(ctx,x,y,w,h,10,true,false);
  ctx.strokeStyle='rgba(0,0,0,0.18)';
  ctx.lineWidth=1;
  roundRect(ctx,x,y,w,h,10,false,true);
  ctx.globalAlpha=1;

  ctx.fillStyle='#2a1a0a';
  ctx.font='800 12px Nunito, sans-serif';
  ctx.fillText(title, x+pad, y+18);

  let yy=y+36;
  ctx.font='700 11px Nunito, sans-serif';
  for(const L of lines){
    const label = L.cat[0].toUpperCase()+L.cat.slice(1);
    ctx.fillStyle='#2a1a0a';
    ctx.fillText(`${label}: ${L.inv}/${L.cap}`, x+pad, yy);
    const bx=x+pad, by=yy+7, bw=w-pad*2, bh=7;
    ctx.fillStyle='rgba(0,0,0,0.08)'; ctx.fillRect(bx,by,bw,bh);
    const fillW = L.cap? Math.max(0, Math.min(1, L.inv/L.cap))*bw : 0;
    ctx.fillStyle = (L.inv>=L.cap) ? '#e74c3c' : (L.inv/L.cap>0.75 ? '#f39c12' : '#2ecc71');
    ctx.fillRect(bx,by,fillW,bh);
    yy += 18;
  }
  ctx.font='800 11px Nunito, sans-serif';
  const msg = shelvesFull() ? '🚫 Shelves full: cannot accept shipments' : '✅ Space available for shipments';
  ctx.fillStyle = shelvesFull() ? '#c0392b' : '#2a1a0a';
  ctx.fillText(msg, x+pad, y+h-10);

  ctx.restore();
}

// SORTING MINI-GAME
// ═══════════════════════════════════════════════════
const SHELVES=[
  {id:'medicine', lbl:'Medicine',  col:'#FFE0E8',hov:'#FFB0C0',bdr:'#FF6090'},
  {id:'food',     lbl:'Food',      col:'#E0FFE8',hov:'#B0FFB8',bdr:'#50C070'},
  {id:'equipment',lbl:'Equipment', col:'#E0EEFF',hov:'#B0C8FF',bdr:'#5080FF'},
  {id:'decor',    lbl:'Décor',     col:'#F0E0FF',hov:'#D8B0FF',bdr:'#8050CC'},
  {id:'misc',     lbl:'Misc',      col:'#FFF0E0',hov:'#FFD8B0',bdr:'#CC8050'},
];
const PS_SIZE_ROWS=['top','mid','bot'];
const PS_ROW_LABEL={top:'Small',mid:'Medium',bot:'Large'};
const PS_BANDS=['cool','neutral','warm'];

let psItems=[],psStreak=0,psSel=null;
let psPriT={},psOv=null;
let psActive=false;
let psPendingInv={};
let psXPBank=0,psTimeStarted=0,psWholesaleCost=0,psRowPlaced={};

function psBandFromHex(hex){
  if(!hex||hex[0]!=='#'||hex.length<7) return 'neutral';
  const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;
  if(Math.abs(r-g)<18 && Math.abs(g-b)<18) return 'neutral';
  if((r>g+16&&r>b+8)||(r>180&&g>120&&b<90)) return 'warm';
  return 'cool';
}
function psSizeFromTier(tier){ return tier<=1?'top':tier===2?'mid':'bot'; }
function psSlotKey(cat,row,band){ return cat+'|'+row+'|'+band; }

function psStartShipment(force=false){
  if(psActive && !force) return;
  if(shelvesFull()){ showShelfFullPopup(); return; }
  Object.values(psPriT).forEach(t=>clearTimeout(t));
  psPriT={};
  const bb=ul('backroom')*5;
  const count=Math.min(10+G.lv+bb,25);
  const pool=PRODUCTS.filter(p=>p.unlocked);
  if(!pool.length){ notify('No unlocked products for shipment yet.'); return; }

  const draft=[];
  for(let i=0;i<count;i++){
    const p=pool[~~(Math.random()*pool.length)];
    const size=psSizeFromTier(p.tier);
    const band=psBandFromHex(p.color);
    draft.push({
      iid:Date.now()+'-'+i,
      pid:p.id,name:p.name,cat:p.cat,em:p.emoji,price:p.price,tier:p.tier,col:p.color,
      size,band,priority:Math.random()<.2,priOk:true,sorted:false
    });
  }
  const cost=Math.max(10,Math.ceil(draft.reduce((a,it)=>a+it.price*0.55,0)*(1+count*0.005)));
  if(!spend(cost)){ notify('Need 🪙'+cost+' to buy wholesale shipment.'); return; }

  psWholesaleCost=cost;
  psItems=draft;
  psStreak=0;psSel=null;psXPBank=0;psPendingInv={};psRowPlaced={};
  psTimeStarted=Date.now();
  psActive=true;

  psItems.filter(i=>i.priority).forEach(item=>{
    psPriT[item.iid]=setTimeout(()=>{ item.priOk=false; if(psOv)psRe(); },10000);
  });
}

function psOpen(){
  if(!psActive) psStartShipment(true);
  if(!psActive) return;
  psBuild();
}

function psBuild(){
  if(psOv)psOv.remove();
  psOv=document.createElement('div');
  psOv.className='ovbg';psOv.style.zIndex='200';
  psOv.innerHTML=`
  <div class="ovpanel" style="width:min(1080px,98vw);">
    <div class="ovhdr">
      <span style="font-size:1.2rem">🧺</span>
      <span class="ovtitle">Shelf Styling Sprint</span>
      <span style="font-size:.62rem;color:rgba(255,255,255,.72)">Sort by shelf + size row + color band for XP</span>
      <button class="ovcls" onclick="psClose()">✕ Close</button>
    </div>
    <div style="padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.12);font-size:.67rem;color:#5e4318;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <span id="ps-prog-txt" style="font-weight:800">0/0</span>
      <span id="ps-time" style="font-weight:700">⏱️ 0.0s</span>
      <span id="ps-xp" style="font-weight:800;color:#1a9e92">0 XP</span>
      <span id="ps-cost" style="font-weight:700;color:#8a3f10">Wholesale: -🪙0</span>
      <span id="ps-hint" style="margin-left:auto;font-size:.62rem;font-weight:700"></span>
    </div>
    <div style="display:grid;grid-template-columns:minmax(230px,300px) 1fr;gap:12px;padding:10px;align-items:start;max-height:66vh;overflow:auto">
      <div>
        <div style="font-size:.62rem;font-weight:800;color:#7a5010;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">📦 Incoming Items</div>
        <div id="ps-tray" style="display:flex;flex-direction:column;gap:6px;max-height:58vh;overflow:auto;padding-right:4px"></div>
      </div>
      <div>
        <div style="font-size:.62rem;font-weight:800;color:#7a5010;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">🏪 Showroom Shelves</div>
        <div id="ps-shelves" class="ps-grid"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;align-items:center;font-weight:700;padding:10px;border-top:1px solid rgba(0,0,0,.12)">
      <span id="ps-str">🔥 Combo ×0</span>
      <button id="ps-collect" onclick="psComplete()" style="padding:8px 14px;background:#27ae60;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:.85rem">Stock Shelves</button>
    </div>
  </div>`;
  document.body.appendChild(psOv);
  psRe();
}

function psRe(){
  const tray=document.getElementById('ps-tray');
  if(!tray) return;
  tray.innerHTML='';
  psItems.filter(i=>!i.sorted).forEach(item=>{
    const el=document.createElement('div');
    const sel=psSel?.iid===item.iid;
    const pLabel=item.priority?(item.priOk?'⚡ Rush':'⌛ Late'):'';
    el.className='ps-item';
    el.draggable=true;
    el.style.background=`linear-gradient(135deg,${item.col||'#ddd'}ee,${item.col||'#ddd'}aa)`;
    el.style.outline=sel?'2px solid #2ec4b6':'none';
    el.innerHTML=`<span style="font-size:1.25rem">${item.em}</span><div><b>${item.name}</b><small>${PS_ROW_LABEL[item.size]} • ${item.band} tone ${pLabel}</small></div>`;
    el.addEventListener('click',()=>{psSel=psSel?.iid===item.iid?null:item;psRe();});
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('iid',item.iid);psSel=item;setTimeout(()=>{el.style.opacity='.45';},0);});
    el.addEventListener('dragend',()=>{el.style.opacity='1';});
    tray.appendChild(el);
  });

  const sh=document.getElementById('ps-shelves');
  sh.innerHTML='';
  SHELVES.forEach(sd=>{
    const shelf=document.createElement('div');
    shelf.className='ps-shelf';
    shelf.style.borderColor=sd.bdr;
    shelf.innerHTML=`<h4>${sd.lbl}</h4>`;
    PS_SIZE_ROWS.forEach(row=>{
      const rowEl=document.createElement('div');
      rowEl.className='ps-row';
      rowEl.innerHTML=`<span class="ps-rowlbl">${PS_ROW_LABEL[row]}</span>`;
      PS_BANDS.forEach(band=>{
        const key=psSlotKey(sd.id,row,band);
        const slot=document.createElement('div');
        const filled=psRowPlaced[key];
        slot.className='ps-slot'+(filled?' filled':'');
        slot.style.background=`linear-gradient(160deg,${sd.col}cc,${sd.hov}aa)`;
        slot.title=`${sd.lbl}: ${PS_ROW_LABEL[row]} ${band}`;
        slot.innerHTML=filled?`<span title="${filled.name}">${filled.em}</span>`:`<small style="font-size:.52rem;opacity:.72">${band}</small>`;
        const onPlace=(it)=>{ if(it) psPlace(it,sd.id,row,band,false); };
        slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('hot');});
        slot.addEventListener('dragleave',()=>slot.classList.remove('hot'));
        slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('hot');const iid=e.dataTransfer.getData('iid');const it=psItems.find(i=>i.iid===iid);onPlace(it);});
        slot.addEventListener('click',()=>onPlace(psSel));
        rowEl.appendChild(slot);
      });
      shelf.appendChild(rowEl);
    });
    sh.appendChild(shelf);
  });

  const tot=psItems.length,sorted=psItems.filter(i=>i.sorted).length;
  const done=(tot>0&&sorted===tot);
  const elapsed=(Date.now()-psTimeStarted)/1000;
  const t=document.getElementById('ps-time');if(t)t.textContent='⏱️ '+elapsed.toFixed(1)+'s';
  const pt=document.getElementById('ps-prog-txt');if(pt)pt.textContent=`${sorted}/${tot} placed`;
  const ps=document.getElementById('ps-str');if(ps)ps.textContent='🔥 Combo ×'+psStreak;
  const xp=document.getElementById('ps-xp');if(xp)xp.textContent=`${Math.floor(psXPBank)} XP banked`;
  const cost=document.getElementById('ps-cost');if(cost)cost.textContent=`Wholesale: -🪙${psWholesaleCost}`;
  const hint=document.getElementById('ps-hint');
  if(hint){
    hint.textContent=done ? '✅ Everything styled. Stock shelves!' : 'Rule: category + size row + color band (cool / neutral / warm).';
  }
  const cb=document.getElementById('ps-collect');
  if(cb){
    cb.disabled=!done;
    cb.style.filter=done?'none':'grayscale(1) brightness(.9)';
    cb.style.opacity=done?'1':'.65';
    cb.style.cursor=done?'pointer':'not-allowed';
  }
}

function psAutoPlaceOne(src='auto'){
  const u=psItems.filter(i=>!i.sorted);
  if(!u.length)return false;
  const it=u[~~(Math.random()*u.length)];
  psPlace(it,it.cat,it.size,it.band,true,src);
  return true;
}

function psPlace(item,shelfId,row,band,auto=false,src='manual'){
  if(!item||item.sorted)return;
  const key=psSlotKey(shelfId,row,band);
  if(psRowPlaced[key]){ if(!auto) notify('That shelf slot is already filled.'); return; }

  if(shelfId===item.cat && row===item.size && band===item.band){
    item.sorted=true;
    psRowPlaced[key]=item;
    psPendingInv[item.pid]=(psPendingInv[item.pid]||0)+1;
    if(psSel?.iid===item.iid) psSel=null;
    psStreak++;

    if(item.priority&&item.priOk) clearTimeout(psPriT[item.iid]);
    const combo=Math.min(1+psStreak*0.04,1.8);
    const tierMul=[1,1,1.25,1.55,1.8][Math.min(item.tier,4)];
    const rush=(item.priority&&item.priOk)?1.35:1;
    const sat=0.85+(G.sat/100)*0.4;
    const rowBonus=row==='top'?1.08:row==='mid'?1.15:1.25;
    const base=8+item.price*0.25;
    let gain=Math.ceil(base*combo*tierMul*rush*sat*rowBonus);
    if(auto) gain=Math.ceil(gain*0.5);
    psXPBank+=gain;
  }else{
    psStreak=0;
    if(!auto) notify('↩️ Layout mismatch. Match shelf, size row, and color tone.');
  }
  if(psOv) psRe();
}

function psComplete(){
  if(!psActive){ notify('No active shipment.'); return; }
  const tot=psItems.length,sorted=psItems.filter(i=>i.sorted).length;
  if(tot===0 || sorted<tot){ notify('⏳ Finish placing all items first.'); return; }

  const secs=Math.max(1,(Date.now()-psTimeStarted)/1000);
  const speed=Math.max(0,Math.ceil(220-secs*4));
  const perfect=psItems.every(i=>i.priOk||!i.priority)?35:0;
  const assistOn=(ul('auto_sort')>0 || G.staff.some(s=>s.id==='stocker'));
  let totalXP=Math.floor(psXPBank+speed+perfect+20);
  if(assistOn) totalXP=Math.floor(totalXP*0.5);
  if(totalXP>0 && addXP(totalXP)) onLevelUp();

  Object.entries(psPendingInv).forEach(([pid,q])=>addInv(pid,q));
  G.ships++;
  notify(`📚 Shelves stocked! +${totalXP} XP${assistOn?' (auto-sort active: 50%)':''}`);

  if(shelvesFull()){
    psActive=false;
    notify('📦 Shelves full — no new shipments until stock sells.');
  }else{
    psStartShipment(true);
  }

  checkMilestones();updateAll();save();
  if(psOv) psRe();
}

function psClose(){
  if(psOv){ psOv.remove(); psOv=null; }
}

const GENE_COLS={
  red:    {body:'#e83232',fin:'#c01010',belly:'#ff9999',stripe:'#aa0000'},
  blue:   {body:'#2255dd',fin:'#1133aa',belly:'#88aaff',stripe:'#001888'},
  yellow: {body:'#f5c800',fin:'#cc9900',belly:'#ffee88',stripe:'#886600'},
  purple: {body:'#9933cc',fin:'#6600aa',belly:'#dd99ff',stripe:'#440088'},
  orange: {body:'#ff6600',fin:'#cc4400',belly:'#ffaa66',stripe:'#882200'},
  gold:   {body:'#ffcc00',fin:'#dd9900',belly:'#ffee88',stripe:'#aa7700'},
  brown:  {body:'#7a4a1a',fin:'#5a3010',belly:'#c49a6a',stripe:'#3a2010'},
  silver: {body:'#c0c0d0',fin:'#909090',belly:'#e8e8f0',stripe:'#606070'},
  white:  {body:'#f0f0f0',fin:'#c0c0c0',belly:'#ffffff',stripe:'#888888'},
};
function gc(gene){return GENE_COLS[gene]||GENE_COLS.blue;}

// Per-species pixel-art fish draw functions
// Each receives (c=ctx, x, y, dir, scale, cols, T, pattern)
const FISH_DRAW={
  guppy:(c,x,y,d,sc,cl,T,pat)=>{
    // Small rounded body + fan tail
    const [bw,bh]=[14*sc,8*sc];
    c.fillStyle=cl.body; roundRect(c,x-bw*.4,y-bh/2,bw*.8,bh,3*sc);c.fill();
    c.fillStyle=cl.belly; roundRect(c,x-bw*.2,y-bh*.2,bw*.4,bh*.4,2*sc);c.fill();
    // Fan tail
    c.fillStyle=cl.fin;
    const tw=8*sc,tanim=Math.sin(T*.006)*1.5*sc;
    c.beginPath();c.moveTo(x+bw*.35*d,y);
    c.lineTo(x+bw*.35*d+tw*d,y-5*sc+tanim);
    c.lineTo(x+bw*.35*d+tw*d,y+5*sc-tanim);
    c.closePath();c.fill();
    // Dorsal fin
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x-bw*.1,y-bh/2);c.lineTo(x+bw*.1,y-bh/2-5*sc);c.lineTo(x+bw*.2,y-bh/2);c.closePath();c.fill();
    // Pattern
    if(pat==='spotted'){c.fillStyle=cl.stripe;[[-3,-1],[1,2],[-1,3]].forEach(([ox,oy])=>{c.beginPath();c.arc(x+ox*sc,y+oy*sc,1.2*sc,0,Math.PI*2);c.fill();});}
    if(pat==='striped'){c.fillStyle=cl.stripe;c.fillRect(x-bw*.1,y-bh*.4,bw*.2,bh*.8);}
    // Eye
    eye(c,x-bw*.15*d,y-1*sc,2*sc);
  },
  neon:(c,x,y,d,sc,cl,T,pat)=>{
    // Slim torpedo body
    const [bw,bh]=[16*sc,6*sc];
    c.fillStyle=cl.body; roundRect(c,x-bw*.45,y-bh/2,bw*.85,bh,bh/2);c.fill();
    // Neon stripe
    c.fillStyle='#00aaff';c.fillRect(x-bw*.3,y-1*sc,bw*.6,2*sc);
    c.fillStyle='#ff3333';c.fillRect(x-bw*.1,y+1*sc,bw*.4,2*sc);
    // Small fork tail
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x+bw*.38*d,y);
    c.lineTo(x+bw*.38*d+6*sc*d,y-4*sc+Math.sin(T*.007)*sc);
    c.lineTo(x+bw*.38*d+3*sc*d,y);
    c.lineTo(x+bw*.38*d+6*sc*d,y+4*sc-Math.sin(T*.007)*sc);
    c.closePath();c.fill();
    eye(c,x-bw*.28*d,y-bh*.1,1.8*sc);
  },
  betta:(c,x,y,d,sc,cl,T,pat)=>{
    const [bw,bh]=[16*sc,9*sc];
    c.fillStyle=cl.body; roundRect(c,x-bw*.4,y-bh/2,bw*.8,bh,4*sc);c.fill();
    // Long flowing fins
    const fa=Math.sin(T*.004)*3*sc;
    c.fillStyle=cl.fin+'bb';
    // Top fin
    c.beginPath();c.moveTo(x-bw*.3,y-bh/2);c.quadraticCurveTo(x,y-bh-8*sc+fa,x+bw*.25,y-bh/2);c.closePath();c.fill();
    // Bottom fin (longer)
    c.beginPath();c.moveTo(x-bw*.15,y+bh/2);c.quadraticCurveTo(x+bw*.1,y+bh+12*sc-fa,x+bw*.3,y+bh/2);c.closePath();c.fill();
    // Flowing tail
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x+bw*.38*d,y-3*sc);
    c.quadraticCurveTo(x+bw*.38*d+10*sc*d,y-8*sc+fa,x+bw*.38*d+14*sc*d,y-5*sc);
    c.quadraticCurveTo(x+bw*.38*d+10*sc*d,y+fa,x+bw*.38*d+14*sc*d,y+5*sc);
    c.quadraticCurveTo(x+bw*.38*d+10*sc*d,y+8*sc-fa,x+bw*.38*d,y+3*sc);
    c.closePath();c.fill();
    if(pat==='striped'){c.fillStyle=cl.stripe+'aa';for(let i=0;i<3;i++)c.fillRect(x-bw*.2+i*bw*.15,y-bh/2,bw*.08,bh);}
    eye(c,x-bw*.2*d,y-1*sc,2.2*sc);
  },
  cory:(c,x,y,d,sc,cl,T,pat)=>{
    // Armored bottom-feeder shape (wider body, flat belly)
    const [bw,bh]=[15*sc,7*sc];
    c.fillStyle=cl.body; roundRect(c,x-bw*.4,y-bh*.3,bw*.8,bh*.9,3*sc);c.fill();
    // Armored plates
    c.strokeStyle=cl.stripe;c.lineWidth=sc*.8;
    for(let i=0;i<4;i++)c.strokeRect(x-bw*.3+i*bw*.15,y-bh*.25,bw*.14,bh*.7);
    // Whisker barbels
    c.strokeStyle=cl.fin;c.lineWidth=sc;
    c.beginPath();c.moveTo(x-bw*.38*d,y+bh*.1);c.lineTo(x-bw*.55*d,y+bh*.35);c.stroke();
    c.beginPath();c.moveTo(x-bw*.38*d,y+bh*.15);c.lineTo(x-bw*.6*d,y+bh*.1);c.stroke();
    // Dorsal fin
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x-bw*.1,y-bh*.28);c.lineTo(x+bw*.05,y-bh*.28-6*sc);c.lineTo(x+bw*.2,y-bh*.28);c.closePath();c.fill();
    // Small tail
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x+bw*.38*d,y-2*sc);c.lineTo(x+bw*.38*d+6*sc*d,y-5*sc);c.lineTo(x+bw*.38*d+6*sc*d,y+4*sc);c.lineTo(x+bw*.38*d,y+2*sc);c.closePath();c.fill();
    eye(c,x-bw*.25*d,y-bh*.05,1.8*sc);
  },
  discus:(c,x,y,d,sc,cl,T,pat)=>{
    // Nearly circular disc body
    const r=10*sc;
    c.fillStyle=cl.body;c.beginPath();c.ellipse(x,y,r,r*1.15,0,0,Math.PI*2);c.fill();
    // Vertical stripes on discus
    c.fillStyle=cl.stripe+'88';
    for(let i=0;i<6;i++){
      const sx=x-r+r*2*i/5;
      c.fillRect(sx,y-r*1.1,r*2/5*.6,r*2.2);
    }
    // Tall dorsal fin
    const df=Math.sin(T*.003)*2*sc;
    c.fillStyle=cl.fin+'cc';
    c.beginPath();c.moveTo(x-r*.4,y-r);c.quadraticCurveTo(x,y-r-9*sc+df,x+r*.4,y-r);c.closePath();c.fill();
    // Anal fin
    c.beginPath();c.moveTo(x-r*.4,y+r);c.quadraticCurveTo(x,y+r+7*sc-df,x+r*.4,y+r);c.closePath();c.fill();
    // Small tail
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x+r*.85*d,y);c.lineTo(x+r*.85*d+7*sc*d,y-5*sc);c.lineTo(x+r*.85*d+7*sc*d,y+5*sc);c.closePath();c.fill();
    eye(c,x-r*.45*d,y-r*.2,2.2*sc);
  },
  goldie:(c,x,y,d,sc,cl,T,pat)=>{
    // Chubby round fancy goldfish
    const [bw,bh]=[16*sc,13*sc];
    c.fillStyle=cl.body;c.beginPath();c.ellipse(x,y,bw*.5,bh*.5,0,0,Math.PI*2);c.fill();
    c.fillStyle=cl.belly;c.beginPath();c.ellipse(x+bw*.05,y+bh*.1,bw*.25,bh*.25,0,0,Math.PI*2);c.fill();
    // Double fan tail
    const ta=Math.sin(T*.005)*2*sc;
    c.fillStyle=cl.fin;
    for(let side of[-1,1]){
      c.beginPath();c.moveTo(x+bw*.45*d,y+side*2*sc);
      c.lineTo(x+bw*.45*d+9*sc*d,y+side*7*sc+ta*side);
      c.lineTo(x+bw*.45*d+5*sc*d,y+side*2*sc);
      c.closePath();c.fill();
    }
    // Flowing top fin
    c.fillStyle=cl.fin+'bb';
    c.beginPath();c.moveTo(x-bw*.3,y-bh*.42);c.quadraticCurveTo(x,y-bh*.42-8*sc+ta,x+bw*.3,y-bh*.42);c.closePath();c.fill();
    if(pat==='spotted'){c.fillStyle=cl.stripe;[[2,-3],[-4,0],[3,4]].forEach(([ox,oy])=>{c.beginPath();c.arc(x+ox*sc,y+oy*sc,2*sc,0,Math.PI*2);c.fill();});}
    eye(c,x-bw*.2*d,y-bh*.1,2.5*sc);
  },
  arowana:(c,x,y,d,sc,cl,T,pat)=>{
    // Long sleek elongated body
    const [bw,bh]=[24*sc,7*sc];
    c.fillStyle=cl.body;c.beginPath();c.moveTo(x-bw*.48,y);c.quadraticCurveTo(x-bw*.3,y-bh/2,x+bw*.35,y-bh*.3);c.lineTo(x+bw*.48,y);c.quadraticCurveTo(x+bw*.3,y+bh*.3,x-bw*.3,y+bh/2);c.closePath();c.fill();
    // Large scale rows
    c.strokeStyle=cl.stripe;c.lineWidth=sc*.6;
    for(let row=0;row<2;row++)for(let col=0;col<6;col++){
      const sx=x-bw*.3+col*bw*.11, sy=y-bh*.15+row*bh*.25;
      c.beginPath();c.arc(sx,sy,2.5*sc,Math.PI,Math.PI*2);c.stroke();
    }
    // Upturned mouth
    c.fillStyle=cl.fin;c.fillRect(x-bw*.49,y-bh*.35,bw*.08,bh*.12);
    // Small pectoral fins
    c.fillStyle=cl.fin+'aa';
    c.beginPath();c.moveTo(x-bw*.15,y+bh*.3);c.lineTo(x-bw*.05,y+bh*.7);c.lineTo(x+bw*.05,y+bh*.35);c.closePath();c.fill();
    // Fork tail
    const ta=Math.sin(T*.004)*sc;
    c.fillStyle=cl.fin;
    c.beginPath();c.moveTo(x+bw*.45*d,y);c.lineTo(x+bw*.45*d+10*sc*d,y-7*sc+ta);c.lineTo(x+bw*.45*d+6*sc*d,y);c.lineTo(x+bw*.45*d+10*sc*d,y+7*sc-ta);c.closePath();c.fill();
    eye(c,x-bw*.37*d,y-bh*.2,2*sc);
  },
  clown:(c,x,y,d,sc,cl,T,pat)=>{
    // Orange oval + white stripes with black edges
    const [bw,bh]=[14*sc,10*sc];
    c.fillStyle='#ff6600';roundRect(c,x-bw*.45,y-bh/2,bw*.9,bh,4*sc);c.fill();
    // 3 white stripes with black edge
    [[-.2,3],[.05,4],[.25,3]].forEach(([ox,sw])=>{
      c.fillStyle='#222';c.fillRect(x+ox*bw-sc*(sw/2+1),y-bh*.48,sw*sc+2,bh*.96);
      c.fillStyle='#fff';c.fillRect(x+ox*bw-sc*sw/2,y-bh*.48,sw*sc,bh*.96);
    });
    // White forehead
    c.fillStyle='#fff';roundRect(c,x-bw*.46,y-bh/2,bw*.2,bh*.5,2*sc);c.fill();
    // Fins
    c.fillStyle='#ff4400';
    c.beginPath();c.moveTo(x-bw*.1,y-bh/2);c.lineTo(x+bw*.1,y-bh/2-6*sc);c.lineTo(x+bw*.25,y-bh/2);c.closePath();c.fill();
    c.beginPath();c.moveTo(x+bw*.38*d,y-3*sc);c.lineTo(x+bw*.38*d+7*sc*d,y-5*sc);c.lineTo(x+bw*.38*d+7*sc*d,y+5*sc);c.lineTo(x+bw*.38*d,y+3*sc);c.closePath();c.fill();
    eye(c,x-bw*.25*d,y-bh*.12,2.2*sc);
  },
};

function roundRect(c,x,y,w,h,r,fill=false,stroke=false){
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
  if(fill)c.fill();
  if(stroke)c.stroke();
}
function eye(c,x,y,r){
  c.fillStyle='#fff';c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  c.fillStyle='#111';c.beginPath();c.arc(x,y,r*.55,0,Math.PI*2);c.fill();
  c.fillStyle='#fff';c.beginPath();c.arc(x+r*.2,y-r*.2,r*.22,0,Math.PI*2);c.fill();
}

// Fish position simulation for tank view
const _tvFish={}; // keyed by fishId → {x,y,vx,vy,wobble}
function getTVFishState(fish,tw,th){
  if(!_tvFish[fish.id]){
    _tvFish[fish.id]={x:Math.random()*tw*.8+tw*.1,y:Math.random()*th*.6+th*.2,vx:(Math.random()-.5)*35,vy:(Math.random()-.5)*15,dir:1,wobble:Math.random()*Math.PI*2};
  }
  const s=_tvFish[fish.id]; if(!s.dir) s.dir = (s.vx>=0?1:-1);
  return s;
}
function updateTVFish(fish,tw,th,dt){
  const s=getTVFishState(fish,tw,th);
  s.wobble+=dt*.004;
  // Swim toward a gentle random target
  if(!s.tx||Math.abs(s.x-s.tx)<8){s.tx=Math.random()*tw*.75+tw*.1;s.ty=Math.random()*th*.55+th*.18; s.dir=(s.tx>=s.x)?1:-1;}
  const dx=s.tx-s.x,dy=s.ty-s.y;
  const spd=fish.sickness==='stress'?(Math.random()<.05?80:25):20;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  s.vx+=(dx/len*spd-s.vx)*.04;
  s.vy+=(dy/len*spd*0.5-s.vy)*.04;
  // Enforce: facing and movement must match
  // dir: -1 = left, +1 = right
  if(s.vx===0) {
    // keep previous dir
  } else {
    s.dir = (s.vx>=0)?1:-1;
  }
  if(s.dir<0) s.vx = -Math.abs(s.vx);
  else s.vx = Math.abs(s.vx);
  s.x=Math.max(tw*.06,Math.min(tw*.94,s.x+s.vx*dt/1000));
  s.y=Math.max(th*.1,Math.min(th*.85,s.y+s.vy*dt/1000));
  if(fish.sickness==='swimblad') s.y=th*.4+Math.sin(s.wobble)*(th*.1);
}

let _tvOv=null,_tvSlot=0,_tvRAF=null,_tvLastT=0;

function openTankView(slot){
  _tvSlot=slot;
  if(_tvOv)_tvOv.remove();
  _tvOv=document.createElement('div');
  _tvOv.className='ovbg';_tvOv.style.zIndex='210';
  const tank=G.tanks[slot];
  const meds=PRODUCTS.filter(p=>p.cat==='medicine'&&p.unlocked&&(G.inv[p.id]||0)>0);

  _tvOv.innerHTML=`
  <div class="ovpanel" style="width:min(760px,96vw);">
    <div class="ovhdr">
      <span style="font-size:1.1rem">🐠</span>
      <span class="ovtitle">Tank ${slot+1}</span>

        ${G.tanks.filter(t=>t.unlocked).map((_,i)=>`<button onclick="openTankView(${i})" style="background:${i===slot?'rgba(79,195,247,.35)':'rgba(0,0,0,.25)'};border:1px solid #4fc3f7;color:#87CEEB;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:.68rem;font-family:Nunito,sans-serif;">Tank ${i+1}</button>`).join('')}
      </div>
      <div style="margin-left:auto;display:flex;gap:6px">

      </div>
    </div>
    <!-- Canvas tank view -->
    <div style="position:relative;flex-shrink:0">
      <canvas id="tv-canvas" style="display:block;width:100%;image-rendering:pixelated;"></canvas>
    </div>
    <!-- Fish status strip -->
    <div id="tv-fishstrip" style="background:#1a3050;padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;overflow-y:auto;max-height:180px;flex-shrink:0;border-top:2px solid #4fc3f7;"></div>
    <!-- Quick actions -->
    <div style="background:#f0e4cc;padding:8px 14px;border-top:2px solid #c49a3a;display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0">
      <button class="fcbtn" style="background:#4CAF50" onclick="feedTank(${slot},'${inFeed('morning')?'AM':'PM'}');rebuildTVStrip()">🍽️ Feed</button>
      <button class="fcbtn" style="background:#2196F3" onclick="cleanTank(${slot});rebuildTVStrip()">🧹 Clean</button>
      <span style="font-size:.7rem;color:#5c4020;padding:5px;align-self:center">Tank ${slot+1}: ${tank.fish.length} fish | Clean: ${~~tank.clean}% | Day ${G.day}</span>
    </div>
  </div>`;
  document.body.appendChild(_tvOv);

  const tvc=document.getElementById('tv-canvas');
  tvc.width=Math.min(760,window.innerWidth-40);
  tvc.height=Math.round(tvc.width*.5);

  rebuildTVStrip();
  // Hover fish info in Tank View canvas
  tvc.addEventListener('mousemove', (ev)=>{
    try{
      _fishTipLastX = ev.clientX;
      _fishTipLastY = ev.clientY;
      const r=tvc.getBoundingClientRect();
      const mx=(ev.clientX-r.left)*(tvc.width/r.width);
      const my=(ev.clientY-r.top)*(tvc.height/r.height);
      const tank=G.tanks[_tvSlot];
      const tw=tvc.width, th=tvc.height*.84;
      let best=null, bestD=1e9;
      tank.fish.forEach(f=>{
        const s=getTVFishState(f,tw,th);
        const dx=mx-s.x, dy=my-s.y;
        const d=dx*dx+dy*dy;
        if(d<bestD){bestD=d; best=f;}
      });
      const sc=Math.max(.9,(tvc.width/400));
      const hitR=18*sc; // generous
      if(best && bestD <= hitR*hitR){
        showFishTip(ev,best.id,_tvSlot);
      } else {
        hideFishTip();
      }
    }catch(e){}
  });
  tvc.addEventListener('mouseleave', ()=>hideFishTip());

  _tvLastT=performance.now();
  function tvLoop(ts){
    if(!document.getElementById('tv-canvas')){cancelAnimationFrame(_tvRAF);return;}
    const dt=Math.min(ts-_tvLastT,80);_tvLastT=ts;
    drawTankView(document.getElementById('tv-canvas'),G.tanks[_tvSlot],dt,ts);
    _tvRAF=requestAnimationFrame(tvLoop);
  }
  _tvRAF=requestAnimationFrame(tvLoop);
}

function closeTankView(){
  if(_tvOv){_tvOv.remove();_tvOv=null;}
  cancelAnimationFrame(_tvRAF);
}

  if(!tank.fish.length){strip.innerHTML='<span style="color:rgba(255,255,255,.4);font-size:.75rem;padding:8px">No fish in this tank. Add some from the Tanks tab →</span>';return;}

    const sp=FISH.find(s=>s.id===fish.sp)||{name:'Unknown',em:'🐟'};

          <div style="font-size:.68rem;font-weight:700;color:#fff">${sp.name}</div>
          <div style="font-size:.55rem;color:rgba(255,255,255,.5)">${fish.cg} ${fish.pg} · ${fish.rarity}</div>

        <div style="flex:1;height:4px;background:rgba(0,0,0,.3);border-radius:2px"><div style="height:100%;width:${fish.health}%;background:${hc};border-radius:2px"></div></div>
        <span style="font-size:.55rem;color:${hc};width:20px;text-align:right">${~~fish.health}%</span>
      </div>
      <div style="display:flex;gap:3px;margin-bottom:${d?'5px':'0'}">
        <div style="flex:1;height:4px;background:rgba(0,0,0,.3);border-radius:2px"><div style="height:100%;width:${fish.hunger}%;background:${hnc};border-radius:2px"></div></div>
        <span style="font-size:.55rem;color:${hnc};width:20px;text-align:right">${~~fish.hunger}%</span>
      </div>

      ${fish.healTimer>0?`<div style="font-size:.55rem;color:#98FB98">💊 Healing ~${~~(fish.healTimer/60)}h</div>`:
        meds.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">${meds.slice(0,3).map(m=>`<button onclick="treatFish('${fish.id}',${_tvSlot},'${m.id}');rebuildTVStrip()" style="background:#9C27B0;color:#fff;border:none;border-radius:4px;padding:2px 5px;cursor:pointer;font-size:.55rem;font-family:Nunito,sans-serif">${m.name}</button>`).join('')}</div>`:
        '<div style="font-size:.55rem;color:#ff9999">No meds in stock!</div>'}`:''
      }
    </div>`;
  }).join('');
}

function drawTankView(tvc,tank,dt,ts){
  if(!tvc)return;
  const tw=tvc.width,th=tvc.height;
  const c=tvc.getContext('2d');
  // Background gradient — deep aquarium water
  const bg=c.createLinearGradient(0,0,0,th);
  bg.addColorStop(0,'#0d2540');bg.addColorStop(.5,'#0d3a5c');bg.addColorStop(1,'#0a2030');
  c.fillStyle=bg;c.fillRect(0,0,tw,th);
  // Dirt/clean tint
  if(tank.clean<60){c.fillStyle=`rgba(90,70,10,${.4*(1-tank.clean/60)})`;c.fillRect(0,0,tw,th);}
  // Caustic light rays
  for(let i=0;i<6;i++){
    const rx=tw*(.1+i*.15)+Math.sin(ts*.0008+i)*tw*.05;
    const g=c.createLinearGradient(rx,0,rx+tw*.06,th);
    g.addColorStop(0,`rgba(100,200,255,${.04+Math.sin(ts*.001+i)*.02})`);g.addColorStop(1,'rgba(100,200,255,0)');
    c.fillStyle=g;c.beginPath();c.moveTo(rx,0);c.lineTo(rx+tw*.06,th);c.lineTo(rx+tw*.04,th);c.lineTo(rx-tw*.02,0);c.closePath();c.fill();
  }
  // Back wall — decorative tiles
  c.fillStyle='#0a2535';c.fillRect(0,0,tw,th*.06);
  for(let x=0;x<tw;x+=Math.round(tw/16)){
    c.fillStyle=x%2===0?'#0f2f45':'#0c2840';
    c.fillRect(x,0,Math.round(tw/16),th*.06);
  }
  // Back plants
  for(let i=0;i<7;i++){
    drawPlantBg(c,tw*.06+i*tw*.13,th*.85,th*.4+i%3*th*.1,ts,i);
  }
  // Mid-water bubbles
  for(let b=0;b<12;b++){
    const bx=tw*((.12+b*.07+Math.sin(ts*.001+b*1.3)*.02));
    const by=th*(1-((ts*.0004+b*.083+b*.031*b)%1));
    const br=(1.2+Math.sin(b*1.7)*.7)*(tw/400);
    c.beginPath();c.arc(bx,by,br,0,Math.PI*2);
    c.fillStyle=`rgba(180,230,255,${.25+Math.sin(ts*.003+b)*.1})`;c.fill();
    c.strokeStyle='rgba(220,240,255,.4)';c.lineWidth=.5;c.stroke();
  }
  // Substrate
  const sub=c.createLinearGradient(0,th*.85,0,th);
  sub.addColorStop(0,'#4a3018');sub.addColorStop(1,'#2a1a08');
  c.fillStyle=sub;c.fillRect(0,th*.85,tw,th*.15);
  // Pebbles in substrate
  for(let i=0;i<22;i++){
    const px=tw*(.03+i*.045+Math.sin(i*2.3)*.02);
    const py=th*(.86+Math.sin(i*1.7)*.03);
    const pr=(2.5+Math.sin(i*1.1)*1.5)*(tw/400);
    const g=c.createRadialGradient(px-pr*.3,py-pr*.3,0,px,py,pr);
    g.addColorStop(0,'#8a6a3a');g.addColorStop(1,'#4a3018');
    c.fillStyle=g;c.beginPath();c.ellipse(px,py,pr,pr*.7,Math.sin(i)*.5,0,Math.PI*2);c.fill();
  }
  // Front plants
  for(let i=0;i<4;i++){
    drawPlantFg(c,tw*(.08+i*.26),th*.86,th*.3+i%2*th*.08,ts,i+10);
  }
  // Update + draw fish
  tank.fish.forEach(fish=>{
    updateTVFish(fish,tw,th*.84,dt);
    const s=getTVFishState(fish,tw,th*.84);
    const dir=(s.dir|| (s.vx>0?1:-1));
    const sc=Math.max(.9,(tw/400));
    const cols=gc(fish.cg);
    const drawFn=FISH_DRAW[fish.sp]||FISH_DRAW.guppy;

    // Disease overlays
    c.save();
    if(fish.sickness==='ich'){
      for(let i=0;i<6;i++){
        const sx=s.x+Math.cos(ts*.06+i*1.05)*14*sc,sy=s.y+Math.sin(ts*.05+i*1.05)*9*sc;
        c.fillStyle=`rgba(255,255,255,${.5+Math.sin(ts*.15+i)*.35})`;
        c.beginPath();c.arc(sx,sy,1.8*sc,0,Math.PI*2);c.fill();
      }
    }
    if(fish.sickness==='fungal'){
      const gr=c.createRadialGradient(s.x,s.y,3,s.x,s.y,20*sc);
      gr.addColorStop(0,`rgba(220,200,255,${.35+Math.sin(ts*.007)*.15})`);gr.addColorStop(1,'rgba(180,160,255,0)');
      c.fillStyle=gr;c.beginPath();c.arc(s.x,s.y,20*sc,0,Math.PI*2);c.fill();
    }
    if(fish.sickness==='finrot') c.filter='sepia(.8) hue-rotate(280deg) saturate(2)';

    // Draw the pixel-art fish
    c.save();
    c.translate(s.x,s.y);
    c.scale(dir,1);
    drawFn(c,0,0,1,sc,cols,ts,fish.pg);
    c.restore();
    c.filter='none';
    c.restore();

    // Health/sickness indicator above fish
    if(fish.health<60||fish.sickness){
      const iw=28*sc;
      c.fillStyle='rgba(0,0,0,.5)';roundRect(c,s.x-iw/2,s.y-18*sc,iw,5*sc,2*sc);c.fill();
      c.fillStyle=fish.health<30?'#f44':fish.health<60?'#fa0':'#4f4';
      roundRect(c,s.x-iw/2,s.y-18*sc,iw*fish.health/100,5*sc,2*sc);c.fill();
    }
    if(fish.sickness){
      c.font=`${~~(9*sc)}px serif`;c.textAlign='center';c.textBaseline='middle';
      c.fillText('⚠️',s.x,s.y-24*sc);
    }
  });
  // Glass frame
  c.strokeStyle='#4fc3f7';c.lineWidth=3;c.strokeRect(1,1,tw-2,th-2);
  c.strokeStyle='rgba(200,240,255,.2)';c.lineWidth=1;c.strokeRect(4,4,tw-8,th-8);
  // Water surface shimmer
  for(let i=0;i<tw;i+=4){
    const sh=Math.sin(ts*.003+i*.04)*1.5+1.5;
    c.fillStyle=`rgba(150,220,255,${.08+sh*.02})`;c.fillRect(i,0,4,sh+2);
  }
  c.textAlign='left';c.textBaseline='alphabetic';
}

function drawPlantBg(c,x,bot,h,ts,seed){
  const cols=['#1a5c2a','#1e7030','#154020','#228835'];
  const col=cols[seed%4];
  const sway=Math.sin(ts*.0015+seed*.8)*4;
  // Stem
  c.strokeStyle=col;c.lineWidth=2;
  c.beginPath();c.moveTo(x,bot);c.quadraticCurveTo(x+sway,bot-h*.5,x+sway*1.5,bot-h);c.stroke();
  // Leaves
  for(let i=0;i<3;i++){
    const lh=(h*(.3+i*.25));
    const lx=x+sway*(i/3),ly=bot-lh;
    const lside=(i%2===0?1:-1);
    c.fillStyle=col;
    c.beginPath();c.moveTo(lx,ly);c.quadraticCurveTo(lx+lside*12+sway,ly-8,lx+lside*16+sway,ly-4);c.quadraticCurveTo(lx+lside*10+sway,ly+2,lx,ly);c.fill();
  }
}
function drawPlantFg(c,x,bot,h,ts,seed){
  const sway=Math.sin(ts*.0018+seed*.9)*5;
  const col=seed%2===0?'#0e4018':'#155a24';
  c.strokeStyle=col;c.lineWidth=3;
  c.beginPath();c.moveTo(x,bot);c.quadraticCurveTo(x+sway,bot-h*.6,x+sway*2,bot-h);c.stroke();
  c.fillStyle=col+'dd';
  c.beginPath();c.ellipse(x+sway*2,bot-h,7,14,Math.sin(ts*.002+seed)*.3,0,Math.PI*2);c.fill();
}

function ensureFishTip(){
  if(document.getElementById('fish-tip')) return;
  const d=document.createElement('div');
  d.id='fish-tip';
  d.addEventListener('mouseenter',()=>{_fishTipOver=true;});
  d.addEventListener('mouseleave',()=>{_fishTipOver=false; hideFishTip();});
  document.body.appendChild(d);
}
let _fishTipOver=false;
let _fishTipFid=null;
let _fishTipSlot=0;
let _fishTipHideT=null;
let _fishTipLockPos=true;
let _fishTipLastX = 0;
let _fishTipLastY = 0;

function bestFoodId(){
  const foods=PRODUCTS.filter(p=>p.cat==='food' && p.unlocked && (G.inv[p.id]||0)>0);
  if(foods.length===0) return null;
  foods.sort((a,b)=>(a.base||a.price||10)-(b.base||b.price||10));
  return foods[0].id;
}

function feedFishIndiv(fid,slot){
  const tank=G.tanks[slot];
  const f=tank.fish.find(x=>x.id===fid); if(!f) return;
  const foodId=bestFoodId();
  if(!foodId){notify('No food in stock — sort a shipment!'); return;}
  if(useInv(foodId,1)<1){notify('No food left — sort a shipment!'); return;}
  f.hunger = clamp(f.hunger + 28, 0, 100);
  if(!f.sickness) f.health = clamp(f.health + 2, 0, 100);
  spawnFloat('🍽️ +Hunger', RL.tanks[slot].x+RL.tanks[slot].w/2, RL.tanks[slot].y+12, '#2ecc71', 1.0);
  refreshFC();
  showFishTip(null,fid,slot);
}

function toggleQuarantineFish(fid,slot){
  const tank=G.tanks[slot];
  const qTank=G.tanks[4];
  const fi=tank.fish.findIndex(x=>x.id===fid);
  if(fi<0) return;
  const f=tank.fish[fi];

  // Toggle quarantine state
  const toQ = !f.quarantine;
  f.quarantine = toQ;

  if(toQ){
    // remember where it came from
    f.qFrom = (slot===4 ? (f.qFrom||0) : slot);
    // move to quarantine tank immediately
    tank.fish.splice(fi,1);
    qTank.fish.push(f);
    notify('🧪 Fish moved to quarantine (cannot be sold).');
    refreshFC();
    showFishTip(null,f.id,4);
    return;
  } else {
    // move back out of quarantine
    const from = (typeof f.qFrom==='number' ? f.qFrom : 0);
    // remove from current tank if we're in quarantine
    if(slot===4){
      const qfi=qTank.fish.findIndex(x=>x.id===fid);
      if(qfi>=0) qTank.fish.splice(qfi,1);
    } else {
      tank.fish.splice(fi,1);
    }
    // choose destination tank: original if unlocked and not quarantine, else first unlocked non-quarantine
    let dest = G.tanks[from] && G.tanks[from].unlocked && !G.tanks[from].quarantine ? G.tanks[from] : null;
    if(!dest){
      dest = G.tanks.find(t=>t.unlocked && !t.quarantine) || G.tanks[0];
    }
    dest.fish.push(f);
    notify('✅ Fish removed from quarantine.');
    refreshFC();
    const destIndex=G.tanks.indexOf(dest);
    showFishTip(null,f.id,destIndex>=0?destIndex:0);
    return;
  }
}


function enforceQuarantinePlacement(){
  const q = G.tanks[4];
  // move quarantined fish into tank 5
  for(let ti=0; ti<G.tanks.length; ti++){
    const t=G.tanks[ti];
    if(!t.unlocked) continue;
    if(t.quarantine) continue;
    for(let i=t.fish.length-1;i>=0;i--){
      const f=t.fish[i];
      if(f.quarantine){
        f.qFrom = (typeof f.qFrom==='number' ? f.qFrom : ti);
        t.fish.splice(i,1);
        q.fish.push(f);
      }
    }
  }
  // move any non-quarantined fish out of quarantine tank
  for(let i=q.fish.length-1;i>=0;i--){
    const f=q.fish[i];
    if(!f.quarantine){
      const from = (typeof f.qFrom==='number' ? f.qFrom : 0);
      let dest = G.tanks[from] && G.tanks[from].unlocked && !G.tanks[from].quarantine ? G.tanks[from] : null;
      if(!dest) dest = G.tanks.find(t=>t.unlocked && !t.quarantine) || G.tanks[0];
      q.fish.splice(i,1);
      dest.fish.push(f);
    }
  }
}

function treatFishAuto(fid,slot){
  const tank=G.tanks[slot];
  const f=tank.fish.find(x=>x.id===fid); if(!f || !f.sickness) return;
  const d=DISEASES[f.sickness];
  if(!d) return;
  if((G.inv[d.med]||0)<=0){notify('No '+d.medName+' in stock — restock medicine.'); return;}
  treatFish(fid,slot,d.med);
  refreshFC();
  showFishTip(null,fid,slot);
}

    (d ? (

        '<div style="font-weight:900;color:#c0392b;font-size:.75rem">🦠 '+d.name+'</div>'+
        '<div style="font-size:.66rem;color:#666;margin-top:2px">'+d.sym+'</div>'+
        '<div style="font-size:.66rem;color:#666;margin-top:4px">Needs: <b>'+d.medName+'</b> '+medStock+'</div>'+
        (healTxt?('<div style="margin-top:4px;color:#2ecc71;font-weight:900;font-size:.68rem">💊 '+healTxt+'</div>'):'')+
      '</div>'
    ) : '')+

    '<div class="ft-btns">'+
      '<button class="ft-btn" style="background:#27ae60" onclick="feedFishIndiv(\''+fid+'\','+slot+')" '+(canFeed?'':'disabled')+'>🍽️ Feed</button>'+
      '<button class="ft-btn" style="background:'+(q?'#7f8c8d':'#34495e')+'" onclick="toggleQuarantineFish(\''+fid+'\','+slot+')">'+(q?'🧪 Unquarantine':'🧪 Quarantine')+'</button>'+
      (d && !healTxt ? '<button class="ft-btn" style="background:#c0392b" onclick="treatFishAuto(\''+fid+'\','+slot+')">💊 Treat</button>' : '')+
    '</div>';

  tip.style.display='block';

  // Only reposition if we have a real event, otherwise keep last known position
  if(ev){
    moveFishTip(ev);
    positionFishTip(ev);
  } else {
    positionFishTip(null);
  }
}

function positionFishTip(ev){
  const tip=document.getElementById('fish-tip'); 
  if(!tip) return;

  const cx = (ev && typeof ev.clientX === 'number') ? ev.clientX : _fishTipLastX;
  const cy = (ev && typeof ev.clientY === 'number') ? ev.clientY : _fishTipLastY;

  let x=cx+14, y=cy+14;

  tip.style.display='block';
  tip.style.position='fixed';

  // measure
  tip.style.left='-9999px';
  tip.style.top='-9999px';
  const r=tip.getBoundingClientRect();

  const maxX=window.innerWidth - r.width - 10;
  const maxY=window.innerHeight - r.height - 10;

  if(x>maxX) x=maxX;
  if(y>maxY) y=maxY;
  if(x<10) x=10;
  if(y<10) y=10;

  tip.style.left=x+'px';
  tip.style.top=y+'px';
}

function moveFishTip(ev){
  if(ev){
    _fishTipLastX = ev.clientX;
    _fishTipLastY = ev.clientY;
  }
  const tip=document.getElementById('fish-tip'); 
  if(!tip || tip.style.display==='none') return;
  if(_fishTipLockPos) return;
  positionFishTip(ev);
}


function hideFishTip(immediate=false){
  const tip=document.getElementById('fish-tip'); if(!tip) return;
  if(_fishTipOver) return;
  if(_fishTipHideT){ clearTimeout(_fishTipHideT); _fishTipHideT=null; }
  if(immediate){ tip.style.display='none'; return; }
  // Grace period so the mouse can move from fish to the tooltip
  _fishTipHideT=setTimeout(()=>{
    if(!_fishTipOver){
      const t=document.getElementById('fish-tip');
      if(t) t.style.display='none';
    }
  }, 180);
}

function updateTopBar(){
  function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

  s('tb-rate',fmt(G.cps||0));
  s('tb-sat',~~G.sat+'%');

  s('tb-day','Day '+G.day);
  s('tb-time',timeStr());
  G.invMax=totalShelfCap(); s('tb-inv',totalInv()+'/'+G.invMax);
  // Disable shipments when shelves are full
  const sb=document.querySelector('.bb-sort');
  if(sb){
    const full=shelvesFull();
    sb.disabled=full;

    sb.style.filter=full?'grayscale(0.35)':'';
    sb.title=full?'Shelves full - wait for customers to buy stock or upgrade capacity':'';
  }

  const need=XP_TABLE[Math.min(G.lv,XP_TABLE.length-1)];
  const xf=document.getElementById('xp-fill');if(xf)xf.style.width=(G.xp/need*100)+'%';

function onMenuButtonTap(){
  if(window.innerWidth<=768){
    const panel=document.getElementById('right-panel');
    const isOpen=panel?.classList.contains('rp-open');
    if(!isOpen){
      switchTab('upgrades');
      return;
    }
    if(_rpMobileMinimized){
      setRightPanelMobileMinimized(false);
      rpMobileOpen();
    }else{
      setRightPanelMobileMinimized(true);
    }
    return;
  }
  switchTab('upgrades');
}

function switchTab(tab){
  if(window.innerWidth>768&&_rpMinimized)setRightPanelMinimized(false);
  _tab=tab;
  document.querySelectorAll('.rp-tab').forEach(b=>b.classList.toggle('rp-tab-active',b.dataset.tab===tab));
  updatePanel();
  if(window.innerWidth<=768){
    setRightPanelMobileMinimized(false);
    rpMobileOpen();
  }
}
function setRightPanelMinimized(minimized){
  if(window.innerWidth<=768)return;
  _rpMinimized=minimized;
  const panel=document.getElementById('right-panel');
  const btn=document.getElementById('rp-min-btn');
  panel?.classList.toggle('rp-minimized',minimized);
  if(btn){
    btn.textContent=minimized?'▶':'◀';
    btn.title=minimized?'Expand menu':'Minimize menu';
  }
}
function toggleRightPanel(){
  if(window.innerWidth<=768){
    setRightPanelMobileMinimized(!_rpMobileMinimized);
    if(_rpMobileMinimized)rpMobileOpen();
    return;
  }
  setRightPanelMinimized(!_rpMinimized);
}
function setRightPanelMobileMinimized(minimized){
  if(window.innerWidth>768)return;
  _rpMobileMinimized=minimized;
  const panel=document.getElementById('right-panel');
  const btn=document.getElementById('rp-min-btn');
  panel?.classList.toggle('rp-minimized-mobile',minimized);
  if(btn){
    btn.textContent=minimized?'▲':'▼';
    btn.title=minimized?'Expand menu':'Minimize menu';
  }
}
function rpMobileOpen(){
  document.getElementById('right-panel').classList.add('rp-open');
  document.getElementById('rp-backdrop').classList.add('rp-open');
}
function rpMobileClose(){
  if(window.innerWidth<=768)setRightPanelMobileMinimized(false);
  document.getElementById('right-panel').classList.remove('rp-open');
  document.getElementById('rp-backdrop').classList.remove('rp-open');
}

// ═══════════════════════════════════════════════════
// BACKGROUND AUTO-SORT (works even when menu is closed)
// ═══════════════════════════════════════════════════
let _bgSortTimer=0;
function bgAutoSortTick(dt){
  if(!psActive)return;
  if(ul('auto_sort')===0)return;
  const closedSortBoost = (!G.open)?6:1;
  const ivs=[8000,5000,3000];
  let iv=ivs[Math.min(ul('auto_sort')-1,2)];
  iv = iv / closedSortBoost;
  _bgSortTimer+=dt;
  if(_bgSortTimer<iv)return;
  _bgSortTimer=0;
  psAutoPlaceOne('auto_sort');
}

// ═══════════════════════════════════════════════════
// CUSTOMER SPAWN TIMER
// ═══════════════════════════════════════════════════
let _custTimer=0;
function custSpawnTick(dt){
  if(!G.open)return;
  _custTimer+=dt;
  const baseRate=8000; // ms between spawns
  const mktBonus=[1,0.85,0.7,0.55,0.38][Math.min(ul('marketing'),4)];
  const promoterBonus=G.staff.some(s=>s.id==='promoter')?0.6:1;
  const rushBonus=G.shopStats.rushActive?0.5:1;
  const satFactor = (1.25 - (G.sat/100)*0.55); // higher sat => more customers
  const spawnInterval=baseRate*mktBonus*promoterBonus*rushBonus*satFactor;
  if(_custTimer>=spawnInterval&&custs.length<18){
    _custTimer=0;
    spawnCust();
  }
}

// ═══════════════════════════════════════════════════
// CASHIER BEHAVIOR (visual only)
// ═══════════════════════════════════════════════════
function clerkTick(dtMs){
  const dt=dtMs/1000;
  // Keep cashier at counter when shop is closed
  if(!G.open){
    CL.state='home';
    CL.x=CL.homeX; CL.y=CL.homeY;
    return;
  }

  const anyCheckout = custs.some(c=>c.state==='ckwalk'||c.state==='ck');

  if(anyCheckout){
    // Return to register when a customer is arriving or waiting
    CL.state='return';
    CL.targetX=CL.homeX; CL.targetY=CL.homeY;
  } else {
    // If idle at home, occasionally go look at fish tanks
    CL.wanderT = (CL.wanderT||0) - dtMs;
    if((CL.state==='home' || CL.state==='return') && CL.wanderT<=0){
      if(Math.random()<0.22 && RL.tanks && RL.tanks.length){
        const t = RL.tanks[~~(Math.random()*RL.tanks.length)];
        // stand in front of the tanks (below the wall)
        CL.state='wander';
        CL.targetX = t.x + t.w/2;
        CL.targetY = RL.wallH + CHAR_RAD + 6;
        CL.lookT = 1200 + Math.random()*2200;
      }
      CL.wanderT = 4200 + Math.random()*5200;
    }

    if(CL.state==='wander'){
      const reached = moveTo(CL, CL.targetX, CL.targetY, 52*dt);
      if(reached){
        CL.state='look';
      }
    } else if(CL.state==='look'){
      CL.lookT -= dtMs;
      if(CL.lookT<=0){
        CL.state='return';
        CL.targetX=CL.homeX; CL.targetY=CL.homeY;
      }
    } else if(CL.state==='return'){
      const reached = moveTo(CL, CL.targetX, CL.targetY, 60*dt);
      if(reached) CL.state='home';
    } else {
      // home: nothing
    }
  }

  // If a checkout appears while looking/wandering, override above and head back.
  if(anyCheckout && (CL.state==='wander' || CL.state==='look')){
    CL.state='return';
    CL.targetX=CL.homeX; CL.targetY=CL.homeY;
  }

  // Safety clamp
  CL.x = clamp(CL.x, CHAR_RAD+2, W-(CHAR_RAD+2));
  CL.y = clamp(CL.y, RL.wallH+(CHAR_RAD+2), H-(CHAR_RAD+2));
}

// ═══════════════════════════════════════════════════
// MAIN GAME LOOP
// ═══════════════════════════════════════════════════
let _last=0,_uiTimer=0;

function gameLoop(ts){
  const dt=Math.min(ts-(_last||ts),100); // cap at 100ms
  _last=ts;

  timeTick(dt);
  fishTick(dt);
  custTick(dt);
  clerkTick(dt);
  custSpawnTick(dt);
  bgAutoSortTick(dt);
  staffSortTick(dt);
  shopIncentiveTick(dt);
  econTick(dt);
  saveTick(dt);
  render(dt);

  _uiTimer+=dt;
  if(_uiTimer>200){
    _uiTimer=0;
    updateAll();
    checkMilestones();
    // Live-update shop button label (reflects rush state)
    const sb=document.getElementById('btn-shop');
    if(sb)sb.innerHTML=shopBtnLabel();
  }

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init(){
  rendInit();
  ensureFishTip();
  window.addEventListener('resize',()=>rendResize());

  invInit();
  const loaded=load();

  if(!loaded){
    // Starter inventory
    const starters={
      flakes:5,pellets:5,aquasafe:3,ich_treat:3,saltbath:2,
      filter:2,heater:2,airpump:3,gravel:4,plants:3,
      net:5,bucket:3,thermom:2,cleanpad:4
    };
    Object.entries(starters).forEach(([id,q])=>addInv(id,q));

    // Starter fish in tank 1
    G.tanks[0].fish.push(mkFish('guppy','red','solid'));
    G.tanks[0].fish.push(mkFish('guppy','blue','spotted'));

    notify('👋 Welcome to Fin & Fortune! Sort your first shipment to restock!');
  } else {
    notify('💾 Welcome back! Day '+G.day+', Level '+G.lv);
  }

  updateAll();
  document.getElementById('btn-shop').innerHTML=shopBtnLabel();
  requestAnimationFrame(gameLoop);
}

// init() is called by the startup screen Play button
function fishHoverAt(mx,my){
  // returns {tankIndex, fishId, fish, x,y} or null
  for(let ti=0;ti<G.tanksN;ti++){
    const tl=RL.tanks[ti];
    const tank=G.tanks[ti];
    if(!tank||!tank.unlocked) continue;
    if(mx<tl.x||mx>tl.x+tl.w||my<tl.y||my>tl.y+tl.h) continue;
    const total=tank.fish.length;
    if(!total) continue;
    const cols=Math.max(1,Math.ceil(Math.sqrt(total)));
    const zw=(tl.w-8)/cols, zh=(tl.h-18)/Math.ceil(total/cols);
    for(let fi=0;fi<total;fi++){
      const fish=tank.fish[fi];
      const col=fi%cols,row=~~(fi/cols);
      const bx=tl.x+4+col*zw+zw/2, by=tl.y+11+row*zh+zh/2;
      const dx=Math.sin(T*.002+fish.ao)*Math.min(zw*.3,10);
      const dy=Math.cos(T*.0015+fish.ao)*Math.min(zh*.25,5);
      const fx=bx+dx, fy=by+dy;
      const rr=10;
      const d2=(mx-fx)*(mx-fx)+(my-fy)*(my-fy);
      if(d2<=rr*rr){
        return {tankIndex:ti, fishId:fish.id, fish, x:fx, y:fy};
      }
    }
  }
  return null;
}

function drawFishTooltip(){
  if(!hoverFish) return;
  const f=hoverFish.fish;
  const sp=FISH.find(s=>s.id===f.sp)||{name:'Fish',tier:1};
  const m=metaOf(f.sp);
  const pad=10;
  const lines=[
    ['Species', sp.name+' (T'+sp.tier+')'],
    ['Rarity', (f.rarity||'common')],
    ['Health', (~~f.health)+'%'],
    ['Hunger', (~~f.hunger)+'%'],
    ['Clean', (~~(G.tanks[hoverFish.tankIndex].clean||0))+'%'],
    ['Temper', m.group+' | size '+m.size+' | aggr '+m.aggr],
  ];
  if(f.sickness){
    const d=DISEASES[f.sickness];
    lines.push(['Sick', (d?d.name:f.sickness)]);
  }
  const w=300;
  const h=pad*2 + 20 + lines.length*18;
  let x=hoverMX+14, y=hoverMY+14;
  if(x+w>W-10) x=W-w-10;
  if(y+h>H-10) y=H-h-10;

  ctx.save();
  ctx.globalAlpha=0.97;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  roundRect(ctx,x,y,w,h,10,true,false);
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;
  roundRect(ctx,x,y,w,h,10,false,true);
  ctx.fillStyle='#2a2a2a';
  ctx.font='700 12px Nunito,sans-serif';
  ctx.fillText('🐟 Fish Info (Tank '+(hoverFish.tankIndex+1)+')', x+pad, y+16);
  ctx.font='11px Nunito,sans-serif';
  let yy=y+34;
  for(const [k,v] of lines){
    ctx.fillStyle='#666';ctx.fillText(k+':', x+pad, yy);
    ctx.fillStyle='#111';ctx.fillText(v, x+pad+92, yy);
    yy+=18;
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════
// STARTUP SCREEN
// ═══════════════════════════════════════════════════
function showStartup(){
  const screen=document.getElementById('startup-screen');
  const canvas=document.getElementById('startup-canvas');
  const ctx=canvas.getContext('2d');

  // Peek at save data without loading it into G
  let sd=null;
  try{sd=JSON.parse(localStorage.getItem('ff_v5'));}catch(e){}

  // Populate save info panel
  const saveEl=document.getElementById('su-save');
  if(sd){
    const fishCount=(sd.tanks||[]).reduce((a,t)=>a+(t.fish||[]).length,0);
    saveEl.innerHTML=
      '<div class="su-save-lbl">💾 Save File</div>'+
      '<div class="su-save-row">'+
        '<div class="su-stat"><span class="su-stat-val">☀️ '+(sd.day||1)+'</span><span class="su-stat-lbl">Day</span></div>'+
        '<div class="su-stat"><span class="su-stat-val">⭐ '+(sd.lv||1)+'</span><span class="su-stat-lbl">Level</span></div>'+
        '<div class="su-stat"><span class="su-stat-val">🪙 '+Math.floor(sd.coins||0)+'</span><span class="su-stat-lbl">Coins</span></div>'+
        '<div class="su-stat"><span class="su-stat-val">🐟 '+fishCount+'</span><span class="su-stat-lbl">Fish</span></div>'+
      '</div>';
  }else{
    saveEl.innerHTML='<div style="font-size:.65rem;color:rgba(255,255,255,.33);">No save found — start a new adventure!</div>';
    document.getElementById('su-reset').style.display='none';
  }

  // ── Animated fish tank ──────────────────────────
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  const FISH_COLS=['#FF8C69','#4FC3F7','#FFD700','#81C784','#CE93D8','#F48FB1','#80DEEA','#FFAB40','#AED581'];

  function mkMF(){
    const r=Math.random()>.5;
    return{
      x:r?-55:W+55,
      y:H*.14+Math.random()*H*.73,
      vx:(r?1:-1)*(.45+Math.random()*.8),
      vy:(Math.random()-.5)*.2,
      wobble:Math.random()*Math.PI*2,
      wSpd:.026+Math.random()*.024,
      wAmp:2+Math.random()*4,
      size:17+Math.random()*24,
      color:FISH_COLS[~~(Math.random()*FISH_COLS.length)],
      tail:Math.random()*Math.PI*2,
      tSpd:.09+Math.random()*.08,
      depth:.3+Math.random()*.7,
      bubT:0,bubI:80+~~(Math.random()*100),
    };
  }

  const mFish=[];
  for(let i=0;i<14;i++){const f=mkMF();f.x=Math.random()*(W||1200);f.wobble+=i*.7;mFish.push(f);}

  const mBubs=[];
  const mWeed=[];
  function initWeed(){
    mWeed.length=0;
    const n=Math.max(4,~~(W/110));
    for(let i=0;i<n;i++){
      mWeed.push({
        x:20+Math.random()*(W-40),
        h:45+Math.random()*65,
        segs:4+~~(Math.random()*4),
        phase:Math.random()*Math.PI*2,
        color:Math.random()>.5?'#2d8c5e':'#388e3c',
      });
    }
  }
  initWeed();
  window.addEventListener('resize',initWeed);

  let _lt=0,_raf;
  function drawMenu(ts){
    if(screen.style.display==='none')return;
    const dt=ts-(_lt||ts);_lt=ts;
    ctx.clearRect(0,0,W,H);

    // Ocean BG
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#070d1c');bg.addColorStop(.55,'#0b1a35');bg.addColorStop(1,'#070e0c');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // Caustic light rays
    for(let i=0;i<6;i++){
      const rx=W*.08+W*.155*i+Math.sin(ts*.00025+i*1.1)*28;
      ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx-35,H);ctx.lineTo(rx+70,H);ctx.closePath();
      const rg=ctx.createLinearGradient(0,0,0,H);
      rg.addColorStop(0,'rgba(46,196,182,'+(0.034+.017*Math.sin(ts*.00045+i))+')');
      rg.addColorStop(1,'rgba(46,196,182,0)');
      ctx.fillStyle=rg;ctx.fill();
    }

    // Sandy bottom
    const sg=ctx.createLinearGradient(0,H-32,0,H);
    sg.addColorStop(0,'#2c1c09');sg.addColorStop(1,'#160c03');
    ctx.fillStyle=sg;ctx.fillRect(0,H-32,W,32);
    ctx.strokeStyle='rgba(75,50,12,.45)';ctx.lineWidth=1.5;
    for(let sx=0;sx<W;sx+=38){
      ctx.beginPath();ctx.ellipse(sx+Math.sin(ts*.00018+sx*.04)*6,H-18,15,4.5,0,0,Math.PI);ctx.stroke();
    }

    // Seaweed
    mWeed.forEach(sw=>{
      ctx.save();ctx.translate(sw.x,H-32);
      for(let s=0;s<sw.segs;s++){
        const t2=s/sw.segs;
        const sx2=Math.sin(ts*.001+sw.phase+s*.4)*(12*t2);
        ctx.strokeStyle=sw.color;ctx.lineWidth=Math.max(1,4-s*.55);ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(sx2,-s*(sw.h/sw.segs));
        ctx.bezierCurveTo(sx2+sx2*.6,-(s+.5)*(sw.h/sw.segs),sx2,-(s+1)*(sw.h/sw.segs),sx2*.5,-(s+1)*(sw.h/sw.segs));
        ctx.stroke();
        if(s%2===0){
          ctx.beginPath();ctx.ellipse(sx2+9*t2,-(s+.5)*(sw.h/sw.segs),8,3,Math.PI*.3,0,Math.PI*2);
          ctx.fillStyle=sw.color+'77';ctx.fill();
        }
      }
      ctx.restore();
    });

    // Bubbles
    if(Math.random()<.045)mBubs.push({x:Math.random()*W,y:H-32,r:1+Math.random()*3,vy:.5+Math.random()*.7,life:1,dx:Math.random()*.3-.15});
    mBubs.forEach(b=>{
      b.y-=b.vy;b.x+=b.dx;
      const frac=(H-32-b.y)/(H*.82);b.life=Math.max(0,1-frac);
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.strokeStyle='rgba(120,220,210,'+(0.35*b.life)+')';ctx.lineWidth=1;ctx.stroke();
    });
    for(let i=mBubs.length-1;i>=0;i--){if(mBubs[i].y<0||mBubs[i].life<=0)mBubs.splice(i,1);}

    // Fish (sorted by depth for parallax)
    mFish.sort((a,b)=>a.depth-b.depth);
    mFish.forEach((f,i)=>{
      f.wobble+=f.wSpd;f.tail+=f.tSpd;
      f.x+=f.vx;f.y+=f.vy+Math.sin(f.wobble)*f.wAmp*.1;
      if(f.y<H*.06)f.vy=Math.abs(f.vy);
      if(f.y>H-54)f.vy=-Math.abs(f.vy);
      if((f.vx>0&&f.x>W+65)||(f.vx<0&&f.x<-65)){Object.assign(f,mkMF());f.wobble+=i*.5;}
      f.bubT++;
      if(f.bubT>f.bubI){
        f.bubT=0;f.bubI=80+~~(Math.random()*100);
        mBubs.push({x:f.x+(f.vx>0?f.size:-f.size)*.55,y:f.y-f.size*.35,r:1+Math.random()*2,vy:.5+Math.random()*.5,life:1,dx:Math.random()*.2-.1});
      }

      const s=f.size;
      ctx.save();ctx.globalAlpha=0.45+f.depth*.55;
      ctx.translate(f.x,f.y+Math.sin(f.wobble)*f.wAmp);
      if(f.vx<0)ctx.scale(-1,1);

      // Body
      ctx.beginPath();ctx.ellipse(0,0,s,s*.44,0,0,Math.PI*2);ctx.fillStyle=f.color;ctx.fill();
      // Tail
      const tw=Math.sin(f.tail)*s*.58;
      ctx.beginPath();ctx.moveTo(-s*.65,0);ctx.lineTo(-s*1.18,tw);ctx.lineTo(-s*1.18,-tw);ctx.closePath();
      ctx.fillStyle=f.color+'cc';ctx.fill();
      // Belly shine
      ctx.beginPath();ctx.ellipse(s*.08,s*.1,s*.52,s*.2,0,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.18)';ctx.fill();
      // Dorsal fin
      ctx.beginPath();ctx.moveTo(s*.08,-s*.4);ctx.lineTo(-s*.18,-s*.7);ctx.lineTo(-s*.52,-s*.42);ctx.closePath();
      ctx.fillStyle=f.color+'aa';ctx.fill();
      // Stripe
      ctx.beginPath();ctx.ellipse(-s*.1,0,s*.25,s*.18,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.09)';ctx.fill();
      // Eye
      ctx.beginPath();ctx.arc(s*.44,-s*.09,s*.12,0,Math.PI*2);ctx.fillStyle='#0a0a1a';ctx.fill();
      ctx.beginPath();ctx.arc(s*.46,-s*.11,s*.04,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
      ctx.restore();
    });

    _raf=requestAnimationFrame(drawMenu);
  }
  _raf=requestAnimationFrame(drawMenu);

  window._startupCleanup=function(){
    cancelAnimationFrame(_raf);
    window.removeEventListener('resize',resize);
    window.removeEventListener('resize',initWeed);
  };
}

function startupPlay(){
  startAudio();
  const screen=document.getElementById('startup-screen');
  screen.style.transition='opacity .5s';
  screen.style.opacity='0';
  if(window._startupCleanup)window._startupCleanup();
  setTimeout(()=>{screen.style.display='none';init();},500);
}
function startupReset(){document.getElementById('su-confirm').style.display='';}
function confirmReset(){localStorage.removeItem('ff_v5');location.reload();}

showStartup();
bindUiClickAudio();

</script>
